<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پیش‌بینی جام جهانی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --dark: #000000;
    --dark2: #0a0a0a;
    --dark3: #111111;
    --green: #00e676;
    --red: #ff1744;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,215,0,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: #000000;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,215,0,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,100,255,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

  /* HEADER */
  header {
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
  }
  .trophy-icon { font-size: 4rem; animation: float 3s ease-in-out infinite; display: block; margin-bottom: 10px; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  header h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }
  header p { color: rgba(255,255,255,0.5); margin-top: 8px; font-size: 0.95rem; }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px;
    margin: 24px 0;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    background: none;
    border: none;
    transition: all 0.3s;
  }
  .tab.active {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(255,215,0,0.3);
  }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* MATCH CARD */
  .match-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    transition: border-color 0.3s;
  }
  .match-card:hover { border-color: rgba(255,215,0,0.3); }
  .match-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .match-stage { font-size: 0.75rem; color: var(--gold); background: rgba(255,215,0,0.1); padding: 3px 10px; border-radius: 20px; }
  .match-date { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
  .match-teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .team { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .team-flag { font-size: 2rem; }
  .team-name { font-size: 0.85rem; font-weight: 600; text-align: center; }
  .vs-badge {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000;
    font-weight: 900;
    font-size: 0.75rem;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* SCORE INPUTS */
  .score-inputs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
  .score-input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    color: #fff;
    font-size: 1.4rem;
    font-weight: 700;
    font-family: 'Vazirmatn', sans-serif;
    transition: all 0.3s;
    outline: none;
  }
  .score-input:focus { border-color: var(--gold); background: rgba(255,215,0,0.08); }
  .score-divider { text-align: center; color: rgba(255,255,255,0.3); font-size: 1.2rem; font-weight: 700; }

  /* PLAYER SELECT */
  .player-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .player-tab {
    padding: 7px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    border: 2px solid transparent;
    transition: all 0.3s;
  }
  .player-tab[data-player="0"] { background: rgba(255,100,100,0.15); border-color: rgba(255,100,100,0.3); color: #ff6b6b; }
  .player-tab[data-player="1"] { background: rgba(100,200,255,0.15); border-color: rgba(100,200,255,0.3); color: #64c8ff; }
  .player-tab[data-player="2"] { background: rgba(100,255,150,0.15); border-color: rgba(100,255,150,0.3); color: #64ff96; }
  .player-tab.active[data-player="0"] { background: rgba(255,100,100,0.4); border-color: #ff6b6b; }
  .player-tab.active[data-player="1"] { background: rgba(100,200,255,0.4); border-color: #64c8ff; }
  .player-tab.active[data-player="2"] { background: rgba(100,255,150,0.4); border-color: #64ff96; }

  /* BUTTONS */
  .btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000;
    border: none;
    padding: 14px 32px;
    border-radius: 14px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: all 0.3s;
    margin-top: 8px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,165,0,0.4); }
  .btn:active { transform: translateY(0); }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--gold);
  }
  .btn-outline:hover { background: rgba(255,215,0,0.1); }
  .btn-danger {
    background: rgba(255,23,68,0.15);
    border: 2px solid rgba(255,23,68,0.5);
    color: #ff1744;
  }
  .btn-danger:hover { background: rgba(255,23,68,0.3); box-shadow: 0 8px 25px rgba(255,23,68,0.3); }

  /* LEADERBOARD */
  .leaderboard-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px;
    border-radius: 16px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
  }
  .leaderboard-item:hover { transform: translateX(-4px); }
  .lb-1 { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.05)); border: 1px solid rgba(255,215,0,0.4); }
  .lb-2 { background: linear-gradient(135deg, rgba(192,192,192,0.1), rgba(192,192,192,0.03)); border: 1px solid rgba(192,192,192,0.3); }
  .lb-3 { background: linear-gradient(135deg, rgba(205,127,50,0.1), rgba(205,127,50,0.03)); border: 1px solid rgba(205,127,50,0.3); }
  .rank { font-size: 1.8rem; width: 40px; text-align: center; }
  .lb-info { flex: 1; }
  .lb-name { font-weight: 700; font-size: 1.05rem; }
  .lb-stats { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .lb-score {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* HISTORY */
  .history-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .history-match { font-weight: 700; margin-bottom: 8px; font-size: 0.95rem; }
  .history-result { color: var(--gold); margin-bottom: 10px; font-size: 0.85rem; }
  .predictions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .pred-item { text-align: center; padding: 8px; border-radius: 10px; font-size: 0.8rem; }
  .pred-item.correct { background: rgba(0,230,118,0.15); border: 1px solid rgba(0,230,118,0.3); }
  .pred-item.wrong { background: rgba(255,23,68,0.1); border: 1px solid rgba(255,23,68,0.2); }
  .pred-item .pred-score { font-weight: 700; font-size: 1rem; margin-top: 3px; }
  .pred-item .pred-pts { font-size: 0.75rem; margin-top: 2px; color: var(--green); }
  .pred-item.wrong .pred-pts { color: rgba(255,255,255,0.3); }

  /* SETTINGS */
  .input-group { margin-bottom: 16px; }
  .input-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 8px; display: block; }
  .input-field {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    color: #fff;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.3s;
    text-align: right;
  }
  .input-field:focus { border-color: var(--gold); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000;
    padding: 14px 28px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.9rem;
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* INFO BADGE */
  .info-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 20px;
    width: 100%;
  }

  /* POINTS GUIDE */
  .points-guide { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
  .pg-item { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 14px; text-align: center; }
  .pg-pts { font-size: 1.5rem; font-weight: 900; color: var(--gold); }
  .pg-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 4px; }

  /* SECTION LABEL */
  .section-label { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); }
  .empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; }

  /* ADD MATCH */
  .add-match-form { display: none; }
  .add-match-form.open { display: block; animation: fadeIn 0.3s; }
  .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: end; }
  
  @media(max-width:600px) {
    .points-guide { grid-template-columns: repeat(3, 1fr); }
    .predictions-grid { grid-template-columns: repeat(3, 1fr); }
    .teams-row { grid-template-columns: 1fr 1fr; }
    .teams-row .vs-text { display: none; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px">
  <div style="font-size:3rem;animation:float 1.5s ease-in-out infinite">&#127942;</div>
  <div style="color:rgba(255,255,255,0.6);font-family:Vazirmatn,sans-serif">در حال اتصال به سرور...</div>
  <div style="width:40px;height:40px;border:3px solid rgba(255,215,0,0.2);border-top-color:#FFD700;border-radius:50%;animation:spin 0.8s linear infinite"></div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<div id="app" style="display:none">
<div class="container">
  <header>
    <span class="trophy-icon">🏆</span>
    <h1>پیش‌بینی جام جهانی</h1>
    <p id="subtitle">بازی‌ها رو پیش‌بینی کن، امتیاز بگیر، قهرمان شو!</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('leaderboard')">🥇 جدول</button>
    <button class="tab" onclick="switchTab('predict')">⚽ پیش‌بینی</button>
    <button class="tab" onclick="switchTab('results')">✅ نتایج</button>
    <button class="tab" onclick="switchTab('history')">📜 تاریخچه</button>
    <button class="tab" onclick="switchTab('settings')">⚙️ تنظیمات</button>
  </div>

  <!-- LEADERBOARD -->
  <div class="panel active" id="panel-leaderboard">
    <div id="leaderboard-content"></div>
    <div class="card" style="margin-top:16px">
      <div class="card-title">📌 سیستم امتیازدهی</div>
      <div class="points-guide">
        <div class="pg-item"><div class="pg-pts">3</div><div class="pg-label">نتیجه دقیق</div></div>
        <div class="pg-item"><div class="pg-pts">1</div><div class="pg-label">برنده درست</div></div>
        <div class="pg-item"><div class="pg-pts">0</div><div class="pg-label">اشتباه</div></div>
      </div>
    </div>
  </div>

  <!-- PREDICT -->
  <div class="panel" id="panel-predict">
    <div class="info-badge">
      <span>👤</span>
      <span>پیش‌بینی برای: </span>
      <strong id="active-player-name" style="color:var(--gold)">—</strong>
    </div>
    <div class="player-tabs" id="player-selector"></div>
    <div id="predict-content"></div>
  </div>

  <!-- RESULTS -->
  <div class="panel" id="panel-results">
    <div class="card">
      <div class="card-title">➕ افزودن بازی جدید</div>
      <button class="btn btn-outline" onclick="toggleAddMatch()" id="add-match-btn" style="margin-bottom:12px">+ افزودن بازی</button>
      <div class="add-match-form" id="add-match-form">
        <div class="teams-row">
          <div class="input-group" style="margin:0">
            <label class="input-label">تیم اول (اسم)</label>
            <input class="input-field" id="team1-name" placeholder="مثال: ایران">
          </div>
          <div style="padding-bottom:4px;text-align:center;color:rgba(255,255,255,0.3)" class="vs-text">VS</div>
          <div class="input-group" style="margin:0">
            <label class="input-label">تیم دوم (اسم)</label>
            <input class="input-field" id="team2-name" placeholder="مثال: آمریکا">
          </div>
        </div>
        <div class="teams-row" style="margin-top:10px">
          <div class="input-group" style="margin:0">
            <label class="input-label">پرچم تیم اول (emoji)</label>
            <input class="input-field" id="team1-flag" placeholder="🇮🇷" style="font-size:1.3rem;text-align:center">
          </div>
          <div></div>
          <div class="input-group" style="margin:0">
            <label class="input-label">پرچم تیم دوم (emoji)</label>
            <input class="input-field" id="team2-flag" placeholder="🇺🇸" style="font-size:1.3rem;text-align:center">
          </div>
        </div>
        <div class="input-group" style="margin-top:10px">
          <label class="input-label">مرحله</label>
          <select class="input-field" id="match-stage">
            <option>مرحله گروهی</option>
            <option>یک‌هشتم نهایی</option>
            <option>یک‌چهارم نهایی</option>
            <option>نیمه‌نهایی</option>
            <option>فینال</option>
          </select>
        </div>
        <button class="btn" onclick="addMatch()" style="margin-top:8px">✅ افزودن بازی</button>
      </div>
    </div>

    <div id="results-content"></div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-history">
    <div id="history-content"></div>
  </div>

  <!-- SETTINGS -->
  <div class="panel" id="panel-settings">
    <div class="card">
      <div class="card-title">👥 اسم بازیکنان</div>
      <div id="player-names-inputs"></div>
      <button class="btn" onclick="savePlayers()">💾 ذخیره</button>
    </div>
    <div class="card">
      <div class="card-title">🗑️ مدیریت داده</div>
      <button class="btn btn-danger" onclick="resetAll()">پاک کردن همه داده‌ها</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ===== STATE =====
let state = {
  players: ['پوریا', 'بهنام', 'مهدی'],
  matches: JSON.parse(JSON.stringify(DEFAULT_MATCHES)),
  nextId: 73,
  activePlayer: 0
};

let dbLoaded = false;

// ===== FIREBASE SYNC =====
function save() {
  const toSave = {
    players: state.players,
    nextId: state.nextId,
    matches: state.matches.map(m => ({
      ...m,
      result: m.result || null,
      predictions: m.predictions.map(p => p || null)
    }))
  };
  db.ref('gameState').set(toSave);
}

// Listen for realtime changes
db.ref('gameState').on('value', (snapshot) => {
  const data = snapshot.val();
  if (data) {
    const ap = state.activePlayer;
    state = { ...data, activePlayer: ap };
    if (!state.matches || state.matches.length < 72) {
      state.matches = JSON.parse(JSON.stringify(DEFAULT_MATCHES));
      save();
    }
  } else {
    // First time: initialize with defaults
    state.matches = JSON.parse(JSON.stringify(DEFAULT_MATCHES));
    state.players = ['پوریا', 'بهنام', 'مهدی'];
    state.nextId = 73;
    save();
  }
  if (!dbLoaded) {
    dbLoaded = true;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }
  render();
}, (error) => {
  // Firebase error - show message
  document.getElementById('loading').innerHTML = `
    <div style="text-align:center;padding:40px;font-family:Vazirmatn,sans-serif;color:#fff">
      <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
      <div style="color:#FFD700;font-size:1.1rem;margin-bottom:8px">خطا در اتصال به Firebase</div>
      <div style="color:rgba(255,255,255,0.5);font-size:0.85rem;direction:ltr">${error.message}</div>
      <div style="margin-top:16px;color:rgba(255,255,255,0.4);font-size:0.8rem">لطفاً Rules دیتابیس را چک کنید</div>
    </div>`;
});

// ===== POINTS =====
function calcPoints(pred, result) {
  if (!pred || !result) return 0;
  if (pred.g1 === result.g1 && pred.g2 === result.g2) return 3;
  const pw = pred.g1 > pred.g2 ? 1 : pred.g1 < pred.g2 ? -1 : 0;
  const rw = result.g1 > result.g2 ? 1 : result.g1 < result.g2 ? -1 : 0;
  if (pw === rw) return 1;
  return 0;
}

function playerScore(pIdx) {
  let total = 0, exact = 0, correct = 0;
  state.matches.forEach(m => {
    if (m.result) {
      const pts = calcPoints(m.predictions[pIdx], m.result);
      total += pts;
      if (pts === 3) exact++;
      else if (pts === 1) correct++;
    }
  });
  return { total, exact, correct };
}

// ===== TABS =====
const tabs = document.querySelectorAll('.tab');
function switchTab(name) {
  tabs.forEach((t,i) => t.classList.toggle('active', ['leaderboard','predict','results','history','settings'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  render();
}

// ===== RENDER =====
function render() {
  renderLeaderboard();
  renderPredict();
  renderResults();
  renderHistory();
  renderSettings();
  updateSubtitle();
}

function updateSubtitle() {
  const pending = state.matches.filter(m => !m.result).length;
  document.getElementById('subtitle').textContent = `${pending} بازی در انتظار نتیجه`;
}

function renderLeaderboard() {
  const scores = state.players.map((name, i) => ({ name, i, ...playerScore(i) }));
  scores.sort((a,b) => b.total - a.total || b.exact - a.exact);
  const ranks = ['🥇','🥈','🥉'];
  let html = '';
  scores.forEach((s, rank) => {
    html += `<div class="leaderboard-item lb-${rank+1}">
      <div class="rank">${ranks[rank]||'🏅'}</div>
      <div class="lb-info">
        <div class="lb-name">${s.name}</div>
        <div class="lb-stats">نتیجه دقیق: ${s.exact} • برنده درست: ${s.correct}</div>
      </div>
      <div class="lb-score">${s.total}</div>
    </div>`;
  });
  if (!state.matches.some(m => m.result)) {
    html = `<div class="empty"><div class="empty-icon">⏳</div><p>هنوز هیچ نتیجه‌ای ثبت نشده</p></div>`;
  }
  document.getElementById('leaderboard-content').innerHTML = html;
}

function renderPredict() {
  let ptHtml = state.players.map((name, i) =>
    `<button class="player-tab ${state.activePlayer===i?'active':''}" data-player="${i}" onclick="selectPlayer(${i})">${name}</button>`
  ).join('');
  document.getElementById('player-selector').innerHTML = ptHtml;
  document.getElementById('active-player-name').textContent = state.players[state.activePlayer];

  const pending = state.matches.filter(m => !m.result);
  if (!pending.length) {
    document.getElementById('predict-content').innerHTML = `<div class="empty"><div class="empty-icon">✅</div><p>همه بازی‌ها نتیجه داده‌اند</p></div>`;
    return;
  }
  let html = '';
  pending.forEach(m => {
    const pred = m.predictions[state.activePlayer];
    html += `<div class="match-card">
      <div class="match-header">
        <span class="match-stage">${m.stage}</span>
        <span class="match-date">#${m.id}</span>
      </div>
      <div class="match-teams">
        <div class="team"><div class="team-flag">${m.flag1}</div><div class="team-name">${m.team1}</div></div>
        <div class="vs-badge">VS</div>
        <div class="team"><div class="team-flag">${m.flag2}</div><div class="team-name">${m.team2}</div></div>
      </div>
      <div class="score-inputs">
        <input class="score-input" type="number" min="0" max="20" value="${pred?pred.g1:''}" placeholder="0"
          onchange="savePred(${m.id}, 'g1', this.value)" id="pred-${m.id}-g1">
        <div class="score-divider">:</div>
        <input class="score-input" type="number" min="0" max="20" value="${pred?pred.g2:''}" placeholder="0"
          onchange="savePred(${m.id}, 'g2', this.value)" id="pred-${m.id}-g2">
      </div>
    </div>`;
  });
  document.getElementById('predict-content').innerHTML = html;
}

        <input class="score-input" type="number" min="0" max="20" placeholder="0" id="res-${m.id}-g1">
        <div class="score-divider">:</div>
        <input class="score-input" type="number" min="0" max="20" placeholder="0" id="res-${m.id}-g2">
      </div>
      <button class="btn" style="margin-top:10px" onclick="submitResult(${m.id})">✅ ثبت نتیجه</button>
    </div>`;
  });
  document.getElementById('results-content').innerHTML = html;
}

function renderHistory() {
  const done = state.matches.filter(m => m.result);
  if (!done.length) {
    document.getElementById('history-content').innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>هنوز هیچ بازی‌ای به پایان نرسیده</p></div>`;
    return;
  }
  let html = '';
  [...done].reverse().forEach(m => {
    const predsHtml = state.players.map((name, i) => {
      const pred = m.predictions[i];
      const pts = calcPoints(pred, m.result);
      const cls = pts > 0 ? 'correct' : 'wrong';
      return `<div class="pred-item ${cls}">
        <div>${name}</div>
        <div class="pred-score">${pred ? `${pred.g1}:${pred.g2}` : '—'}</div>
        <div class="pred-pts">${pts > 0 ? '+'+pts+' امتیاز' : 'صفر'}</div>
      </div>`;
    }).join('');
    html += `<div class="history-item">
      <div class="history-match">${m.flag1} ${m.team1} vs ${m.team2} ${m.flag2} • ${m.stage}</div>
      <div class="history-result">نتیجه: ${m.result.g1} - ${m.result.g2}</div>
      <div class="predictions-grid">${predsHtml}</div>
    </div>`;
  });
  document.getElementById('history-content').innerHTML = html;
}

function renderSettings() {
  let html = state.players.map((name, i) => `
    <div class="input-group">
      <label class="input-label">بازیکن ${i+1}</label>
      <input class="input-field" id="pname-${i}" value="${name}" placeholder="اسم بازیکن">
    </div>
  `).join('');
  document.getElementById('player-names-inputs').innerHTML = html;
}

// ===== ACTIONS =====
function selectPlayer(i) {
  state.activePlayer = i;
  renderPredict();
}

function savePred(matchId, field, val) {
  const m = state.matches.find(x => x.id === matchId);
  if (!m) return;
  if (!m.predictions[state.activePlayer]) m.predictions[state.activePlayer] = { g1: 0, g2: 0 };
  m.predictions[state.activePlayer][field] = parseInt(val) || 0;
  save();
  showToast('پیش‌بینی ذخیره شد ✓');
}

function submitResult(matchId) {
  const m = state.matches.find(x => x.id === matchId);
  const g1 = parseInt(document.getElementById(`res-${matchId}-g1`).value);
  const g2 = parseInt(document.getElementById(`res-${matchId}-g2`).value);
  if (isNaN(g1) || isNaN(g2)) { showToast('لطفاً نتیجه را وارد کنید'); return; }
  m.result = { g1, g2 };
  save();
  showToast(`نتیجه ${m.team1} ${g1} - ${g2} ${m.team2} ثبت شد! 🎉`);
}

function toggleAddMatch() {
  const form = document.getElementById('add-match-form');
  form.classList.toggle('open');
  document.getElementById('add-match-btn').textContent = form.classList.contains('open') ? '✕ بستن' : '+ افزودن بازی';
}

function addMatch() {
  const t1 = document.getElementById('team1-name').value.trim();
  const t2 = document.getElementById('team2-name').value.trim();
  const f1 = document.getElementById('team1-flag').value.trim() || '🏳️';
  const f2 = document.getElementById('team2-flag').value.trim() || '🏳️';
  const stage = document.getElementById('match-stage').value;
  if (!t1 || !t2) { showToast('اسم هر دو تیم را وارد کنید'); return; }
  state.matches.push({ id: state.nextId++, team1: t1, team2: t2, flag1: f1, flag2: f2, stage, result: null, predictions: [null,null,null] });
  save();
  showToast(`بازی ${t1} vs ${t2} اضافه شد! ⚽`);
  ['team1-name','team2-name','team1-flag','team2-flag'].forEach(id => document.getElementById(id).value = '');
  toggleAddMatch();
}

function savePlayers() {
  state.players = state.players.map((_, i) => document.getElementById(`pname-${i}`).value.trim() || `بازیکن ${i+1}`);
  save();
  showToast('اسامی ذخیره شد ✓');
}

function resetAll() {
  if (!confirm('مطمئنی؟ همه داده‌ها پاک می‌شن!')) return;
  db.ref('gameState').remove().then(() => location.reload());
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</div>
</body>
</html>
