#splash::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom,rgba(0,0,0,0) 30%,rgba(0,0,0,0.95) 70%)}
#splash.show{display:flex}
.splash-content{position:relative;z-index:1;width:100%;padding:0 20px;display:flex;flex-direction:column;align-items:center}
.splash-title{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:28px;text-align:center;animation:fadeUp .6s forwards}
.choose-title{font-family:'Cinzel Decorative',serif;font-size:1.1rem;font-weight:900;color:#FFD700;margin-bottom:28px;text-align:center;letter-spacing:6px;opacity:0;animation:fadeUp .6s forwards, chooseGlow 3s ease-in-out infinite;text-shadow:0 0 12px rgba(255,215,0,0.6),0 0 24px rgba(255,165,0,0.3)}
@keyframes chooseGlow{
  0%,100%{text-shadow:0 0 8px rgba(255,215,0,0.5),0 0 20px rgba(255,165,0,0.2)}
  50%{text-shadow:0 0 16px rgba(255,215,0,0.9),0 0 35px rgba(255,165,0,0.5),0 0 60px rgba(255,215,0,0.2)}
}
.player-cards{display:flex;flex-direction:column;gap:12px;width:100%}
.player-card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .3s;backdrop-filter:blur(10px);opacity:0;animation:fadeUp .5s forwards}
.player-card:nth-child(1){animation-delay:.1s}
.player-card:nth-child(2){animation-delay:.2s}
.player-card:nth-child(3){animation-delay:.3s}
.player-card[data-p="0"]{border-color:rgba(255,100,100,.3)}
.player-card[data-p="1"]{border-color:rgba(100,200,255,.3)}
.player-card[data-p="2"]{border-color:rgba(100,255,150,.3)}
.player-card:active{transform:scale(.97)}
.player-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.pa0{background:rgba(255,100,100,.2)}.pa1{background:rgba(100,200,255,.2)}.pa2{background:rgba(100,255,150,.2)}
.player-card-name{font-size:1.05rem;font-weight:700;flex:1}
.player-card-arrow{color:rgba(255,255,255,.3);font-size:1.3rem}
#splash.exit{animation:splashExit .5s forwards}
@keyframes splashExit{to{opacity:0;transform:translateY(-20px);pointer-events:none}}

/* ===== PW MODAL ===== */
.pw-sheet{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);overflow-y:auto}
.pw-sheet.open{display:block;animation:fadeIn .3s}
.pw-sheet-inner{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
.pw-box{background:#111;border:1px solid rgba(255,215,0,.25);border-radius:24px;padding:28px 24px 32px;width:100%;max-width:360px;animation:scaleIn .35s cubic-bezier(.34,1.2,.64,1)}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.pw-box{background:#111;border:1px solid rgba(255,215,0,.2);border-radius:24px 24px 0 0;padding:28px 24px 44px;width:100%;max-width:500px;}

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.pw-title{font-size:1rem;font-weight:700;color:#FFD700;margin-bottom:16px;text-align:center}
.pw-input{width:100%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:13px;color:#fff;font-family:'Vazirmatn',sans-serif;font-size:1.1rem;outline:none;text-align:center;letter-spacing:6px}
.pw-input:focus{border-color:#FFD700}
.pw-error{color:#ff6b6b;font-size:.82rem;text-align:center;margin:8px 0;min-height:20px}
.pw-btns{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.btn-gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;border:none;padding:13px;border-radius:12px;font-family:'Vazirmatn',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;width:100%}
.btn-cancel{background:none;border:none;color:rgba(255,255,255,.3);font-family:'Vazirmatn',sans-serif;font-size:.85rem;cursor:pointer;padding:8px;width:100%}

/* ===== MAIN APP ===== */
#app{display:none;opacity:0;animation:fadeIn .5s .1s forwards}
.container{max-width:860px;margin:0 auto;padding:16px}
header{text-align:center;padding:20px 0 14px}
.header-logo{width:72px;height:72px;border-radius:50%;object-fit:cover;box-shadow:0 0 20px rgba(255,215,0,.35);margin-bottom:10px}
h1{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:rgba(255,255,255,0.4);font-size:.85rem;margin-top:4px}
.tabs{display:flex;background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.15);border-radius:14px;padding:4px;margin:16px 0;gap:3px;overflow-x:auto}
.tab{flex:1;min-width:0;padding:9px 4px;text-align:center;border-radius:10px;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-size:.72rem;font-weight:600;color:rgba(255,255,255,0.4);background:none;border:none;transition:all .3s;white-space:nowrap}
.tab.active{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000}
.panel{display:none;animation:fadeIn .3s}.panel.active{display:block}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.12);border-radius:18px;padding:18px;margin-bottom:12px}
.card-title{color:#FFD700;font-weight:700;margin-bottom:14px;font-size:.92rem}
.match-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:14px;margin-bottom:10px;position:relative}
.match-card.locked{opacity:.55}
.lock-badge{font-size:.68rem;background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.25);color:#ff6b6b;padding:2px 8px;border-radius:20px}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.match-stage{font-size:.7rem;color:#FFD700;background:rgba(255,215,0,0.1);padding:3px 10px;border-radius:20px}
.match-date{font-size:.68rem;color:rgba(255,255,255,.35)}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin:10px 0}
.team{display:flex;flex-direction:column;align-items:center;gap:4px}
.team-flag{font-size:1.7rem}.team-name{font-size:.78rem;font-weight:600;text-align:center}
.vs{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-weight:900;font-size:.68rem;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.score-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.score-input{width:100%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.1);border-radius:10px;padding:9px;text-align:center;color:#fff;font-size:1.25rem;font-weight:700;font-family:'Vazirmatn',sans-serif;outline:none;transition:border-color .3s}
.score-input:focus{border-color:#FFD700}
.score-input:disabled{opacity:.35;cursor:not-allowed}
.score-div{text-align:center;color:rgba(255,255,255,.3);font-size:1rem}
.player-tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ptab{padding:7px 14px;border-radius:10px;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-size:.82rem;font-weight:600;border:2px solid transparent;transition:all .3s}
.ptab[data-p="0"]{background:rgba(255,100,100,.1);border-color:rgba(255,100,100,.3);color:#ff6b6b}
.ptab[data-p="1"]{background:rgba(100,200,255,.1);border-color:rgba(100,200,255,.3);color:#64c8ff}
.ptab[data-p="2"]{background:rgba(100,255,150,.1);border-color:rgba(100,255,150,.3);color:#64ff96}
.ptab.active[data-p="0"]{background:rgba(255,100,100,.35);border-color:#ff6b6b}
.ptab.active[data-p="1"]{background:rgba(100,200,255,.35);border-color:#64c8ff}
.ptab.active[data-p="2"]{background:rgba(100,255,150,.35);border-color:#64ff96}
.btn{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;border:none;padding:12px 20px;border-radius:12px;font-family:'Vazirmatn',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;width:100%;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn-danger{background:rgba(255,23,68,.12);border:2px solid rgba(255,23,68,.35);color:#ff1744}
.lb-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;margin-bottom:10px}
.lb-1{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.03));border:1px solid rgba(255,215,0,.3)}
.lb-2{background:rgba(255,255,255,.03);border:1px solid rgba(192,192,192,.2)}
.lb-3{background:rgba(255,255,255,.02);border:1px solid rgba(205,127,50,.2)}
.lb-rank{font-size:1.5rem;width:32px;text-align:center}
.lb-info{flex:1}.lb-name{font-weight:700}
.lb-stats{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:2px}
.lb-pts{font-size:1.7rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.pts-item{background:rgba(255,255,255,.04);border-radius:10px;padding:10px;text-align:center}
.pts-num{font-size:1.3rem;font-weight:900;color:#FFD700}
.pts-label{font-size:.7rem;color:rgba(255,255,255,.4);margin-top:2px}
.hist-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;margin-bottom:10px}
.hist-match{font-weight:700;margin-bottom:5px;font-size:.9rem}
.hist-result{color:#FFD700;font-size:.82rem;margin-bottom:8px}
.preds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pred-box{text-align:center;padding:7px;border-radius:8px;font-size:.75rem}
.pred-box.ok{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2)}
.pred-box.fail{background:rgba(255,23,68,.06);border:1px solid rgba(255,23,68,.12)}
.pred-box.pending{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.pred-score{font-weight:700;font-size:.9rem;margin-top:2px}
.pred-pts{font-size:.7rem;margin-top:2px;color:#00e676}
.pred-box.fail .pred-pts{color:rgba(255,255,255,.25)}
.pred-box.pending .pred-pts{color:rgba(255,255,255,.25)}
.input-group{margin-bottom:12px}
.input-label{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:6px;display:block}
.input-field{width:100%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#fff;font-family:'Vazirmatn',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s;text-align:right}
.input-field:focus{border-color:#FFD700}
.empty{text-align:center;padding:36px;color:rgba(255,255,255,.3)}
.empty-icon{font-size:2.2rem;margin-bottom:8px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;padding:11px 22px;border-radius:50px;font-weight:700;font-size:.85rem;z-index:2000;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.auto-badge{display:inline-block;background:rgba(100,200,255,.12);border:1px solid rgba(100,200,255,.25);color:#64c8ff;font-size:.68rem;padding:2px 7px;border-radius:20px}
.sync-bar{display:flex;justify-content:flex-end;margin-bottom:12px}
.sync-btn{background:rgba(100,200,255,.12);border:1px solid rgba(100,200,255,.25);color:#64c8ff;padding:6px 14px;border-radius:10px;font-family:'Vazirmatn',sans-serif;font-size:.78rem;cursor:pointer}
.info-bar{display:flex;align-items:center;gap:8px;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.12);border-radius:10px;padding:9px 14px;font-size:.8rem;color:rgba(255,255,255,.6);margin-bottom:14px}

/* Others panel */
.others-match{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px;margin-bottom:10px}
.others-match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.others-preds{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.other-pred{text-align:center;padding:10px 6px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.other-pred-name{font-size:.75rem;color:rgba(255,255,255,.5);margin-bottom:4px}
.other-pred-score{font-size:1.1rem;font-weight:700;color:#FFD700}
.other-pred-score.empty-pred{color:rgba(255,255,255,.2);font-size:.85rem}
.countdown{font-size:.68rem;color:rgba(255,165,0,.8);text-align:center;margin:4px 0 6px;font-weight:600;letter-spacing:.5px}
.countdown.live{color:#00e676;animation:livePulse 1s ease-in-out infinite}
.countdown.soon{color:#FFD700}
.countdown.finished{color:rgba(255,255,255,.3)}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <button class="intro-btn" onclick="enterSplash()">ورود</button>
</div>

<!-- SPLASH (player select) -->
<div id="splash">
  <div class="splash-content">
    <div class="choose-title">Choose</div>
    <div class="player-cards" id="splash-players"></div>
  </div>
</div>

<!-- Password Sheet -->
<div class="pw-sheet" id="pw-sheet">
  <div class="pw-sheet-inner">
  <div class="pw-box">
    <div class="pw-title" id="pw-sheet-title">پسورد را وارد کنید</div>
    <input class="pw-input" type="password" id="pw-sheet-input" placeholder="••••">
    <div class="pw-error" id="pw-sheet-error"></div>
    <div class="pw-btns">
      <button class="btn-gold" onclick="confirmSplashPw()">ورود</button>
      <button class="btn-cancel" onclick="closePwSheet()">انصراف</button>
    </div>
  </div>
</div>

<!-- In-app password modal -->
<div class="pw-sheet" id="inapp-pw-sheet">
  <div class="pw-sheet-inner">
  <div class="pw-box">
    <div class="pw-title" id="inapp-pw-title">پسورد بازیکن</div>
    <input class="pw-input" type="password" id="inapp-pw-input" placeholder="••••">
    <div class="pw-error" id="inapp-pw-error"></div>
    <div class="pw-btns">
      <button class="btn-gold" onclick="confirmInappPw()">تأیید</button>
      <button class="btn-cancel" onclick="closeInappPw()">انصراف</button>
    </div>
  </div>
</div>

var state={players:['پوریا','بهنام','مهدی'],passwords:['1111','2222','3333'],activePlayer:0};

var splashPwIdx=-1;
var inappPwCallback=null;

function toArr(v){return v?(Array.isArray(v)?v:Object.values(v)):[]}

function isLocked(m){
  var s=m.date,parts=s.split('T'),dp=parts[0].split('-'),tp=parts[1].split(':');
  var matchUtc=Date.UTC(+dp[0],+dp[1]-1,+dp[2],+tp[0]-3,+tp[1]-30,0);
  return Date.now()>=(matchUtc-24*60*60*1000);
}

function fmtDate(s){
  var parts=s.split('T'),dp=parts[0].split('-'),tp=parts[1].split(':');
  var mo=['','ژانویه','فوریه','مارس','آوریل','مه','ژوئن','ژوئیه','اوت','سپتامبر','اکتبر','نوامبر','دسامبر'];
  return parseInt(dp[2])+' '+mo[parseInt(dp[1])]+' - '+tp[0]+':'+tp[1];
}

// ===== FIREBASE =====
db.ref('gameState').on('value',function(snap){
  var data=snap.val();
  if(data&&data.matches){
    var dbm=toArr(data.matches);
    matches=MATCHES.map(function(m){
      var x=dbm.find(function(d){return d&&d.id===m.id;});
      return {id:m.id,t1:m.t1,t2:m.t2,f1:m.f1,f2:m.f2,stage:m.stage,date:m.date,
        result:x&&x.result?x.result:null,
        autoResult:x&&x.autoResult?x.autoResult:null,
        preds:x&&x.preds?toArr(x.preds):[null,null,null]};
    });
    if(data.players) state.players=toArr(data.players);
    if(data.passwords) state.passwords=toArr(data.passwords);
  } else {
    matches=MATCHES.map(function(m){return {id:m.id,t1:m.t1,t2:m.t2,f1:m.f1,f2:m.f2,stage:m.stage,date:m.date,result:null,autoResult:null,preds:[null,null,null]};});
    saveAll();
  }
  if(!dbLoaded){dbLoaded=true;renderSplash();}
  if(document.getElementById('app').style.display==='block') render();
},function(err){
  console.error(err);
});

function saveAll(){
  db.ref('gameState').update({
    players:state.players,passwords:state.passwords,
    matches:matches.map(function(m){return {id:m.id,result:m.result||null,autoResult:m.autoResult||null,preds:m.preds||[null,null,null]};})
  });
}

// ===== POINTS =====
function calcPts(p,r){
  if(!p||!r)return 0;
  if(p.g1===r.g1&&p.g2===r.g2)return 3;
  var pw=p.g1>p.g2?1:p.g1<p.g2?-1:0,rw=r.g1>r.g2?1:r.g1<r.g2?-1:0;
  return pw===rw?1:0;
}
function playerScore(pi){
  var t=0,e=0,c=0;
  matches.forEach(function(m){if(m.result){var p=calcPts(m.preds[pi],m.result);t+=p;if(p===3)e++;else if(p===1)c++;}});
  return {total:t,exact:e,correct:c};
}

    document.getElementById('lb-content').innerHTML='<div class="empty"><div class="empty-icon">⏳</div><p>هنوز نتیجه‌ای ثبت نشده</p></div>';return;

}

function renderResults(){
  var done=matches.filter(function(m){return m.result;}).slice().reverse();
  if(!done.length){document.getElementById('results-content').innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>هنوز بازی‌ای تموم نشده</p></div>';return;}
  document.getElementById('results-content').innerHTML=done.map(function(m){
    var ps=state.players.map(function(n,i){
      var p=m.preds[i],pts=calcPts(p,m.result);
      return '<div class="pred-box '+(pts>0?'ok':'fail')+'"><div>'+n+'</div><div class="pred-score">'+(p?p.g1+':'+p.g2:'—')+'</div><div class="pred-pts">'+(pts>0?'+'+pts+' امتیاز':'صفر')+'</div></div>';
    }).join('');
    return '<div class="hist-item"><div class="hist-match">'+ m.f1+' '+m.t1+' vs '+m.t2+' '+m.f2+(m.autoResult?' <span class="auto-badge">🤖</span>':'')+'</div><div class="hist-result">نتیجه: '+m.result.g1+' - '+m.result.g2+'</div><div class="preds-grid">'+ ps+'</div></div>';
  }).join('');
}

function switchPlayer(i){

  inappPwCallback=function(pw){

      state.activePlayer=i;
      closeInappPw();
      renderPredict();

      document.getElementById('inapp-pw-input').value='';
    }
  };
  document.getElementById('inapp-pw-title').textContent='پسورد '+state.players[i];
  document.getElementById('inapp-pw-input').value='';
  document.getElementById('inapp-pw-error').textContent='';
  document.getElementById('inapp-pw-sheet').classList.add('open');

function changePw(i){
  var o=document.getElementById('oldpw'+i).value,n=document.getElementById('newpw'+i).value;
  if(!o||!n){showToast('هر دو فیلد را پر کنید');return;}
  if(o!==state.passwords[i]){showToast('⛔ پسورد فعلی اشتباه');return;}
  if(n.length<3){showToast('پسورد باید ۳ کاراکتر یا بیشتر باشد');return;}
  state.passwords[i]=n;
  db.ref('gameState/passwords').set(state.passwords);
  document.getElementById('oldpw'+i).value='';
  document.getElementById('newpw'+i).value='';
  showToast('پسورد '+state.players[i]+' تغییر کرد ✓');
}

function savePred(mid,field,val){
  var m=matches.find(function(x){return x.id===mid;});
  if(!m||isLocked(m)){showToast('⛔ پیش‌بینی قفل شده');return;}
  if(!m.preds[state.activePlayer]) m.preds[state.activePlayer]={g1:0,g2:0};
  m.preds[state.activePlayer][field]=parseInt(val)||0;
  db.ref('gameState/matches/'+matches.indexOf(m)+'/preds/'+state.activePlayer).set(m.preds[state.activePlayer]);
  showToast('ذخیره شد ✓');
}

function syncResults(){
  showToast('در حال دریافت نتایج...');
  fetch('https://api.football-data.org/v4/competitions/WC/matches?season=2026&stage=GROUP_STAGE',{headers:{'X-Auth-Token':FOOTBALL_API_TOKEN}})
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data.matches){showToast('داده‌ای دریافت نشد');return;}
    var updated=0;
    data.matches.forEach(function(api){
      if(api.status!=='FINISHED')return;
      var g1=api.score.fullTime.home,g2=api.score.fullTime.away;
      if(g1===null||g2===null)return;
      var hn=api.homeTeam.name,an=api.awayTeam.name;
      var found=matches.find(function(m){
        return hn.includes(m.t1.substring(0,3))||m.t1.includes(hn.substring(0,4))||
               an.includes(m.t2.substring(0,3))||m.t2.includes(an.substring(0,4));
      });
      if(found&&!found.result){found.result={g1:g1,g2:g2};found.autoResult=true;updated++;}
    });
    if(updated>0){saveAll();showToast(updated+' نتیجه بروز شد ✓');}
    else showToast('نتیجه جدیدی نبود');
  })
  .catch(function(){showToast('خطا در دریافت نتایج');});
}
setTimeout(syncResults,3000);

function savePlayers(){
  state.players=state.players.map(function(_,i){return document.getElementById('pname'+i).value.trim()||'بازیکن '+(i+1);});
  db.ref('gameState/players').set(state.players);
  showToast('ذخیره شد ✓');render();
}

function resetAll(){
  if(!confirm('مطمئنی؟'))return;
  db.ref('gameState').remove().then(function(){location.reload();});
}

// ===== COUNTDOWN =====
function getCountdown(dateStr){
  var parts=dateStr.split('T'),dp=parts[0].split('-'),tp=parts[1].split(':');
  var matchUtc=Date.UTC(+dp[0],+dp[1]-1,+dp[2],+tp[0]-3,+tp[1]-30,0);
  var now=Date.now();
  var diff=matchUtc-now;
  if(diff<-120*60*1000) return {text:'پایان یافته',cls:'finished'};
  if(diff<0) return {text:'🔴 در حال بازی',cls:'live'};
  if(diff<60*60*1000){
    var m=Math.floor(diff/60000),s=Math.floor((diff%60000)/1000);
    return {text:'⏱ '+m+'m '+s+'s',cls:'soon'};
  }
  if(diff<24*60*60*1000){
    var h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
    return {text:'⏳ '+h+'h '+m+'m',cls:'soon'};
  }
  var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000);
  return {text:'📅 '+d+' روز '+h+' ساعت',cls:''};
}

function updateCountdowns(){
  matches.forEach(function(m){
    var el=document.getElementById('cd-'+m.id);
    if(!el) return;
    var cd=getCountdown(m.date);
    el.textContent=cd.text;
    el.className='countdown'+(cd.cls?' '+cd.cls:'');
  });
}

setInterval(updateCountdowns,1000);

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
</script>
