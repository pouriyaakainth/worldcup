<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پیش‌بینی جام جهانی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Vazirmatn',sans-serif;background:#000;color:#fff;min-height:100vh}
.container{max-width:860px;margin:0 auto;padding:16px}
header{text-align:center;padding:24px 0 16px}
.header-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;box-shadow:0 0 30px rgba(255,215,0,0.4);margin-bottom:12px}
h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:rgba(255,255,255,0.4);font-size:.9rem;margin-top:6px}
.tabs{display:flex;background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.2);border-radius:14px;padding:5px;margin:20px 0;gap:4px}
.tab{flex:1;padding:10px 4px;text-align:center;border-radius:10px;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-size:.78rem;font-weight:600;color:rgba(255,255,255,0.4);background:none;border:none;transition:all .3s}
.tab.active{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000}
.panel{display:none}.panel.active{display:block}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.15);border-radius:18px;padding:20px;margin-bottom:14px}
.card-title{color:#FFD700;font-weight:700;margin-bottom:16px;font-size:.95rem}
.match-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px;margin-bottom:10px;position:relative}
.match-card.locked{opacity:.6}
.lock-badge{position:absolute;top:10px;left:10px;font-size:.7rem;background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.3);color:#ff6b6b;padding:2px 8px;border-radius:20px}
.match-stage{font-size:.72rem;color:#FFD700;background:rgba(255,215,0,0.1);padding:3px 10px;border-radius:20px}
.match-date{font-size:.7rem;color:rgba(255,255,255,.35);margin-right:8px}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin:12px 0}
.team{display:flex;flex-direction:column;align-items:center;gap:4px}
.team-flag{font-size:1.8rem}
.team-name{font-size:.8rem;font-weight:600;text-align:center}
.vs{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-weight:900;font-size:.7rem;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.score-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.score-input{width:100%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px;text-align:center;color:#fff;font-size:1.3rem;font-weight:700;font-family:'Vazirmatn',sans-serif;outline:none;transition:border-color .3s}
.score-input:focus{border-color:#FFD700}
.score-input:disabled{opacity:.4;cursor:not-allowed}
.score-div{text-align:center;color:rgba(255,255,255,0.3);font-size:1.1rem;font-weight:700}
.player-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ptab{padding:8px 16px;border-radius:10px;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-size:.85rem;font-weight:600;border:2px solid transparent;transition:all .3s}
.ptab[data-p="0"]{background:rgba(255,100,100,.1);border-color:rgba(255,100,100,.3);color:#ff6b6b}
.ptab[data-p="1"]{background:rgba(100,200,255,.1);border-color:rgba(100,200,255,.3);color:#64c8ff}
.ptab[data-p="2"]{background:rgba(100,255,150,.1);border-color:rgba(100,255,150,.3);color:#64ff96}
.ptab.active[data-p="0"]{background:rgba(255,100,100,.35);border-color:#ff6b6b}
.ptab.active[data-p="1"]{background:rgba(100,200,255,.35);border-color:#64c8ff}
.ptab.active[data-p="2"]{background:rgba(100,255,150,.35);border-color:#64ff96}
.btn{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;border:none;padding:13px 24px;border-radius:12px;font-family:'Vazirmatn',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;width:100%;margin-top:8px;transition:all .3s}
.btn:hover{opacity:.9}
.btn-outline{background:transparent;border:2px solid #FFD700;color:#FFD700}
.btn-danger{background:rgba(255,23,68,.15);border:2px solid rgba(255,23,68,.4);color:#ff1744}
.lb-item{display:flex;align-items:center;gap:14px;padding:16px;border-radius:14px;margin-bottom:10px}
.lb-1{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,165,0,.04));border:1px solid rgba(255,215,0,.35)}
.lb-2{background:rgba(255,255,255,.04);border:1px solid rgba(192,192,192,.25)}
.lb-3{background:rgba(255,255,255,.03);border:1px solid rgba(205,127,50,.25)}
.lb-rank{font-size:1.6rem;width:36px;text-align:center}
.lb-info{flex:1}.lb-name{font-weight:700}
.lb-stats{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:2px}
.lb-pts{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.pts-item{background:rgba(255,255,255,.04);border-radius:10px;padding:12px;text-align:center}
.pts-num{font-size:1.4rem;font-weight:900;color:#FFD700}
.pts-label{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:3px}
.hist-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:10px}
.hist-match{font-weight:700;margin-bottom:6px}
.hist-result{color:#FFD700;font-size:.85rem;margin-bottom:10px}
.preds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pred-box{text-align:center;padding:8px;border-radius:8px;font-size:.78rem}
.pred-box.ok{background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.25)}
.pred-box.fail{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.15)}
.pred-score{font-weight:700;font-size:.95rem;margin-top:3px}
.pred-pts{font-size:.72rem;margin-top:2px;color:#00e676}
.pred-box.fail .pred-pts{color:rgba(255,255,255,.3)}
.input-group{margin-bottom:14px}
.input-label{font-size:.82rem;color:rgba(255,255,255,.5);margin-bottom:6px;display:block}
.input-field{width:100%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 14px;color:#fff;font-family:'Vazirmatn',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s;text-align:right}
.input-field:focus{border-color:#FFD700}
.empty{text-align:center;padding:40px;color:rgba(255,255,255,.3)}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;padding:12px 24px;border-radius:50px;font-weight:700;font-size:.88rem;z-index:1000;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.auto-badge{display:inline-block;background:rgba(100,200,255,.15);border:1px solid rgba(100,200,255,.3);color:#64c8ff;font-size:.72rem;padding:2px 8px;border-radius:20px}
.sync-bar{display:flex;justify-content:flex-end;margin-bottom:14px}
.sync-btn{background:rgba(100,200,255,.15);border:1px solid rgba(100,200,255,.3);color:#64c8ff;padding:7px 16px;border-radius:10px;font-family:'Vazirmatn',sans-serif;font-size:.82rem;cursor:pointer;transition:all .3s}
.sync-btn:hover{background:rgba(100,200,255,.25)}
.info-bar{display:flex;align-items:center;gap:8px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.15);border-radius:10px;padding:10px 14px;font-size:.82rem;color:rgba(255,255,255,.6);margin-bottom:16px}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:0;background:#000;position:fixed;top:0;left:0;width:100%;z-index:999}
.loading-logo{width:180px;height:180px;border-radius:50%;object-fit:cover;animation:logoPulse 2s ease-in-out infinite;box-shadow:0 0 0 0 rgba(255,215,0,0.7)}
@keyframes logoPulse{
  0%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,215,0,0.7)}
  50%{transform:scale(1.08);box-shadow:0 0 40px 20px rgba(255,215,0,0.15)}
  100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,215,0,0)}
}
.loading-ring{width:200px;height:200px;border-radius:50%;border:2px solid rgba(255,215,0,0.15);position:absolute;animation:ringRotate 3s linear infinite}
.loading-ring2{width:220px;height:220px;border-radius:50%;border:1px solid rgba(255,215,0,0.08);position:absolute;animation:ringRotate 5s linear infinite reverse}
@keyframes ringRotate{to{transform:rotate(360deg)}}
.loading-dots{display:flex;gap:8px;margin-top:24px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:#FFD700;animation:dotBounce 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s;background:#FFA500}
.loading-dot:nth-child(3){animation-delay:.4s;background:#FFD700}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.loading-text{color:rgba(255,255,255,.4);font-size:.85rem;font-family:'Vazirmatn',sans-serif;margin-top:12px}
#loading.hide{animation:fadeOut .5s forwards}
@keyframes fadeOut{to{opacity:0;pointer-events:none}}
#app{display:none}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#0d0d0d;border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:28px;width:90%;max-width:320px}
.modal-title{font-size:1rem;font-weight:700;color:#FFD700;margin-bottom:16px;text-align:center}
.pw-input{width:100%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:10px;padding:12px;color:#fff;font-family:'Vazirmatn',sans-serif;font-size:1rem;outline:none;text-align:center;letter-spacing:4px}
.pw-input:focus{border-color:#FFD700}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
</style>
</head>

var state={players:['پوریا','بهنام','مهدی'],passwords:['1111','2222','3333'],activePlayer:0};

var pwCallback=null;

function toArr(v){return v?(Array.isArray(v)?v:Object.values(v)):[]}

function isLocked(m){
  var d=new Date(m.date);
  return new Date()>=new Date(d.getTime()-24*60*60*1000);
}

function fmtDate(s){
  var d=new Date(s);
  var mo=['ژان','فوری','مارس','آوریل','مه','ژوئن','ژوئیه','اوت','سپت','اکت','نوامبر','دسامبر'];
  return d.getDate()+' '+mo[d.getMonth()]+' '+d.getHours()+':00';
}

db.ref('gameState').on('value',function(snap){
  var data=snap.val();
  if(data&&data.matches){
    var dbm=toArr(data.matches);
    matches=MATCHES.map(function(m){
      var x=dbm.find(function(d){return d&&d.id===m.id;});
      return {id:m.id,t1:m.t1,t2:m.t2,f1:m.f1,f2:m.f2,stage:m.stage,date:m.date,
        result:x&&x.result?x.result:null,
        autoResult:x&&x.autoResult?x.autoResult:null,
        preds:x&&x.preds?toArr(x.preds):[null,null,null]};
    });
    if(data.players) state.players=toArr(data.players);
    if(data.passwords) state.passwords=toArr(data.passwords);
  } else {
    matches=MATCHES.map(function(m){return {id:m.id,t1:m.t1,t2:m.t2,f1:m.f1,f2:m.f2,stage:m.stage,date:m.date,result:null,autoResult:null,preds:[null,null,null]};});
    saveAll();
  }
  var l=document.getElementById('loading');
  l.classList.add('hide');
  setTimeout(function(){l.style.display='none';document.getElementById('app').style.display='block';},500);
  render();
},function(err){
  document.getElementById('loading').innerHTML='<div style="text-align:center;color:#fff;padding:40px;font-family:Vazirmatn,sans-serif"><div style="font-size:2rem">⚠️</div><div style="color:#FFD700;margin-top:10px">خطا در اتصال</div><div style="color:rgba(255,255,255,.4);font-size:.8rem;margin-top:6px;direction:ltr">'+err.message+'</div></div>';
});

function saveAll(){
  db.ref('gameState').update({
    players:state.players,passwords:state.passwords,
    matches:matches.map(function(m){return {id:m.id,result:m.result||null,autoResult:m.autoResult||null,preds:m.preds||[null,null,null]};})
  });
}

function syncResults(){
  showToast('در حال دریافت نتایج...');
  fetch('https://api.football-data.org/v4/competitions/WC/matches?season=2026&stage=GROUP_STAGE',{headers:{'X-Auth-Token':FOOTBALL_API_TOKEN}})
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data.matches){showToast('داده‌ای دریافت نشد');return;}
    var updated=0;
    data.matches.forEach(function(api){
      if(api.status!=='FINISHED')return;
      var g1=api.score.fullTime.home,g2=api.score.fullTime.away;
      if(g1===null||g2===null)return;
      var hn=api.homeTeam.name,an=api.awayTeam.name;
      var found=matches.find(function(m){
        return hn.includes(m.t1.substring(0,3))||m.t1.includes(hn.substring(0,4))||
               an.includes(m.t2.substring(0,3))||m.t2.includes(an.substring(0,4));
      });
      if(found&&!found.result){found.result={g1:g1,g2:g2};found.autoResult=true;updated++;}
    });
    if(updated>0){saveAll();showToast(updated+' نتیجه بروز شد ✓');}
    else showToast('نتیجه جدیدی نبود');
  })
  .catch(function(){showToast('خطا در دریافت نتایج');});
}
setTimeout(syncResults,2500);

function calcPts(p,r){
  if(!p||!r)return 0;
  if(p.g1===r.g1&&p.g2===r.g2)return 3;
  var pw=p.g1>p.g2?1:p.g1<p.g2?-1:0,rw=r.g1>r.g2?1:r.g1<r.g2?-1:0;
  return pw===rw?1:0;
}

function playerScore(pi){
  var t=0,e=0,c=0;
  matches.forEach(function(m){if(m.result){var p=calcPts(m.preds[pi],m.result);t+=p;if(p===3)e++;else if(p===1)c++;}});
  return {total:t,exact:e,correct:c};
}

var tabs=document.querySelectorAll('.tab');
function switchTab(n){
  tabs.forEach(function(t,i){t.classList.toggle('active',['leaderboard','predict','results','settings'][i]===n);});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+n).classList.add('active');
  render();
}

function render(){
  renderLB();renderPredict();renderResults();renderSettings();
  var p=matches.filter(function(m){return !m.result;}).length;
  document.getElementById('subtitle').textContent=p+' بازی در انتظار نتیجه';
}

function renderLB(){
  var sc=state.players.map(function(n,i){return Object.assign({name:n,i:i},playerScore(i));});
  sc.sort(function(a,b){return b.total-a.total||b.exact-a.exact;});
  var rk=['🥇','🥈','🥉'];
  if(!matches.some(function(m){return m.result;})){
    document.getElementById('lb-content').innerHTML='<div class="empty"><div class="empty-icon">⏳</div><p>هنوز نتیجه‌ای ثبت نشده</p></div>';return;
  }
  document.getElementById('lb-content').innerHTML=sc.map(function(s,r){
    return '<div class="lb-item lb-'+(r+1)+'"><div class="lb-rank">'+rk[r]+'</div><div class="lb-info"><div class="lb-name">'+s.name+'</div><div class="lb-stats">دقیق: '+s.exact+' • درست: '+s.correct+'</div></div><div class="lb-pts">'+s.total+'</div></div>';
  }).join('');
}

function renderPredict(){
  document.getElementById('ap-name').textContent=state.players[state.activePlayer];
  document.getElementById('player-tabs').innerHTML=state.players.map(function(n,i){
    return '<button class="ptab'+(state.activePlayer===i?' active':'')+'" data-p="'+i+'" onclick="requestPlayer('+i+')">'+n+'</button>';
  }).join('');
  var pend=matches.filter(function(m){return !m.result;});
  if(!pend.length){document.getElementById('predict-content').innerHTML='<div class="empty"><div class="empty-icon">✅</div><p>همه بازی‌ها نتیجه داده‌اند</p></div>';return;}
  document.getElementById('predict-content').innerHTML=pend.map(function(m){
    var pr=m.preds[state.activePlayer],lk=isLocked(m);
    return '<div class="match-card'+(lk?' locked':'')+'">'+
      (lk?'<span class="lock-badge">🔒 قفل شده</span>':'')+
      '<div style="margin-bottom:8px"><span class="match-stage">'+m.stage+'</span><span class="match-date"> | '+fmtDate(m.date)+'</span></div>'+
      '<div class="match-teams"><div class="team"><div class="team-flag">'+m.f1+'</div><div class="team-name">'+m.t1+'</div></div><div class="vs">VS</div><div class="team"><div class="team-flag">'+m.f2+'</div><div class="team-name">'+m.t2+'</div></div></div>'+
      '<div class="score-row"><input class="score-input" type="number" min="0" max="20" value="'+(pr?pr.g1:'')+'" placeholder="0"'+(lk?' disabled':'')+' onchange="savePred('+m.id+',\'g1\',this.value)"><div class="score-div">:</div><input class="score-input" type="number" min="0" max="20" value="'+(pr?pr.g2:'')+'" placeholder="0"'+(lk?' disabled':'')+' onchange="savePred('+m.id+',\'g2\',this.value)"></div></div>';
  }).join('');
}

function renderResults(){
  var done=matches.filter(function(m){return m.result;}).slice().reverse();
  if(!done.length){document.getElementById('history-content').innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>هنوز بازی‌ای تموم نشده</p></div>';return;}
  document.getElementById('history-content').innerHTML=done.map(function(m){
    var ps=state.players.map(function(n,i){
      var p=m.preds[i],pts=calcPts(p,m.result);
      return '<div class="pred-box '+(pts>0?'ok':'fail')+'"><div>'+n+'</div><div class="pred-score">'+(p?p.g1+':'+p.g2:'—')+'</div><div class="pred-pts">'+(pts>0?'+'+pts+' امتیاز':'صفر')+'</div></div>';
    }).join('');
    return '<div class="hist-item"><div class="hist-match">'+m.f1+' '+m.t1+' vs '+m.t2+' '+m.f2+(m.autoResult?' <span class="auto-badge">🤖</span>':'')+'</div><div class="hist-result">نتیجه: '+m.result.g1+' - '+m.result.g2+'</div><div class="preds-grid">'+ps+'</div></div>';
  }).join('');
}

function renderSettings(){
  // Password change with old password verification
  document.getElementById('pw-settings').innerHTML=state.players.map(function(n,i){
    return '<div class="card" style="margin-bottom:10px;padding:14px">'+
      '<div style="font-weight:700;color:#FFD700;margin-bottom:10px;font-size:.9rem">🔑 '+n+'</div>'+
      '<div class="input-group" style="margin-bottom:8px"><label class="input-label">پسورد فعلی</label><input class="input-field" id="oldpw'+i+'" type="password" placeholder="••••"></div>'+
      '<div class="input-group" style="margin-bottom:8px"><label class="input-label">پسورد جدید</label><input class="input-field" id="newpw'+i+'" type="password" placeholder="••••"></div>'+
      '<button class="btn" style="margin-top:4px" onclick="changePw('+i+')">تغییر پسورد '+n+'</button>'+
      '</div>';
  }).join('');
  document.getElementById('settings-content').innerHTML=state.players.map(function(n,i){
    return '<div class="input-group"><label class="input-label">بازیکن '+(i+1)+'</label><input class="input-field" id="pname'+i+'" value="'+n+'"></div>';
  }).join('');
}

function changePw(i){
  var oldPw=document.getElementById('oldpw'+i).value;
  var newPw=document.getElementById('newpw'+i).value;
  if(!oldPw||!newPw){showToast('هر دو فیلد را پر کنید');return;}
  if(oldPw!==state.passwords[i]){showToast('⛔ پسورد فعلی اشتباه است');return;}
  if(newPw.length<3){showToast('پسورد باید حداقل ۳ کاراکتر باشد');return;}
  state.passwords[i]=newPw;
  db.ref('gameState/passwords').set(state.passwords);
  document.getElementById('oldpw'+i).value='';
  document.getElementById('newpw'+i).value='';
  showToast('پسورد '+state.players[i]+' تغییر کرد ✓');
}

function requestPlayer(i){
  if(i===state.activePlayer)return;
  pwCallback=function(pw){
    if(pw===state.passwords[i]){state.activePlayer=i;closePwModal();renderPredict();}
    else document.getElementById('pw-error').textContent='پسورد اشتباه است';
  };
  document.getElementById('pw-modal-title').textContent='پسورد '+state.players[i];
  document.getElementById('pw-input').value='';
  document.getElementById('pw-error').textContent='';
  document.getElementById('pw-modal').classList.add('open');
  setTimeout(function(){document.getElementById('pw-input').focus();},200);
}

function confirmPw(){if(pwCallback)pwCallback(document.getElementById('pw-input').value);}
function closePwModal(){document.getElementById('pw-modal').classList.remove('open');pwCallback=null;}
document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')confirmPw();});

function savePred(mid,field,val){
  var m=matches.find(function(x){return x.id===mid;});
  if(!m||isLocked(m)){showToast('⛔ پیش‌بینی قفل شده');return;}
  if(!m.preds[state.activePlayer])m.preds[state.activePlayer]={g1:0,g2:0};
  m.preds[state.activePlayer][field]=parseInt(val)||0;
  db.ref('gameState/matches/'+matches.indexOf(m)+'/preds/'+state.activePlayer).set(m.preds[state.activePlayer]);
  showToast('پیش‌بینی ذخیره شد ✓');
}

function savePlayers(){
  state.players=state.players.map(function(_,i){return document.getElementById('pname'+i).value.trim()||'بازیکن '+(i+1);});
  db.ref('gameState/players').set(state.players);
  showToast('ذخیره شد ✓');render();
}

function resetAll(){
  if(!confirm('مطمئنی؟'))return;
  db.ref('gameState').remove().then(function(){location.reload();});
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
</script>
</body>
</html>
