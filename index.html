<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --dark: #000000;
    --dark2: #0a0a0a;
    --dark3: #111111;
    --green: #00e676;
    --red: #ff1744;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,215,0,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: #000000;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,215,0,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,100,255,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeInScale { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideInRight { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  #splash.hide {
    opacity: 0;
    pointer-events: none;
  }
  .splash-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,215,0,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(0,100,255,0.06) 0%, transparent 50%);
  }
  .splash-trophy {
    font-size: 8rem;
    margin-bottom: 24px;
    animation: float 3s ease-in-out infinite;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 40px rgba(255,215,0,0.5));
  }
  .splash-title {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
    text-align: center;
    animation: slideUp 0.8s ease 0.2s both;
  }
  .splash-sub {
    color: rgba(255,255,255,0.4);
    font-size: 1rem;
    margin-bottom: 48px;
    position: relative;
    z-index: 1;
    animation: slideUp 0.8s ease 0.4s both;
  }
  .enter-btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000;
    border: none;
    padding: 16px 56px;
    border-radius: 50px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    z-index: 1;
    animation: slideUp 0.8s ease 0.6s both;
    box-shadow: 0 8px 40px rgba(255,165,0,0.4);
    transition: all 0.3s;
  }
  .enter-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 50px rgba(255,165,0,0.6);
  }

  /* ===== PLAYER SELECT SCREEN ===== */
  #player-select-screen {
    position: fixed;
    inset: 0;
    z-index: 9998;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #player-select-screen.visible {
    opacity: 1;
    pointer-events: all;
  }
  .ps-title {
    font-size: clamp(1.6rem, 5vw, 2.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-align: center;
  }
  .ps-sub { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 40px; text-align: center; }
  .players-list { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }
  .player-select-btn {
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px 24px;
    cursor: pointer;
    font-family: 'Vazirmatn', sans-serif;
    color: #fff;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: slideInRight 0.5s ease both;
  }
  .player-select-btn:nth-child(1) { animation-delay: 0.1s; border-color: rgba(255,100,100,0.3); }
  .player-select-btn:nth-child(2) { animation-delay: 0.2s; border-color: rgba(100,200,255,0.3); }
  .player-select-btn:nth-child(3) { animation-delay: 0.3s; border-color: rgba(100,255,150,0.3); }
  .player-select-btn:hover { transform: scale(1.03); }
  .player-select-btn:nth-child(1):hover { background: rgba(255,100,100,0.12); border-color: rgba(255,100,100,0.6); }
  .player-select-btn:nth-child(2):hover { background: rgba(100,200,255,0.12); border-color: rgba(100,200,255,0.6); }
  .player-select-btn:nth-child(3):hover { background: rgba(100,255,150,0.12); border-color: rgba(100,255,150,0.6); }
  .ps-avatar { font-size: 2.5rem; }
  .ps-name { font-size: 1.2rem; font-weight: 700; text-align: right; }
  .ps-arrow { margin-right: auto; color: rgba(255,255,255,0.3); font-size: 1.2rem; }

  /* Password Modal */
  .pw-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 10000;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
    padding-top: max(80px, 15vh);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(10px);
    overflow-y: auto;
  }
  .pw-modal-overlay.visible { opacity: 1; pointer-events: all; }
  .pw-modal {
    background: #111;
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 24px;
    padding: 32px;
    width: 100%;
    max-width: 360px;
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .pw-modal-overlay.visible .pw-modal { transform: scale(1); }
  .pw-modal-title { font-size: 1.1rem; font-weight: 700; color: var(--gold); margin-bottom: 8px; text-align: center; }
  .pw-modal-sub { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-bottom: 20px; text-align: center; }
  .pw-input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    color: #fff;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 1rem;
    outline: none;
    text-align: center;
    letter-spacing: 4px;
    font-size: 1.2rem;
    transition: border-color 0.3s;
    margin-bottom: 12px;
  }
  .pw-input:focus { border-color: var(--gold); }
  .pw-input.error { border-color: var(--red); animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .pw-error { color: var(--red); font-size: 0.8rem; text-align: center; margin-bottom: 8px; min-height: 20px; }

  /* ===== MAIN APP ===== */
  #app { display: none; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

  header {
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
  }
  .trophy-icon {
    font-size: 4rem;
    display: block;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }
  header p { color: rgba(255,255,255,0.5); margin-top: 8px; font-size: 0.95rem; }
  .current-player-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .current-player-badge:hover { background: rgba(255,215,0,0.2); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px;
    margin: 24px 0;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1;
    min-width: 60px;
    padding: 10px 8px;
    text-align: center;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    background: none;
    border: none;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .tab.active {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(255,215,0,0.3);
  }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* MATCH CARD */
  .match-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    transition: border-color 0.3s, transform 0.2s;
    animation: fadeIn 0.3s ease both;
  }
  .match-card:hover { border-color: rgba(255,215,0,0.3); transform: translateY(-1px); }
  .match-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

function getPlayerCount() {
  return (state.players && state.players.length) || 3;
}

function normalizePrediction(p) {
  if (!p || typeof p !== 'object') return null;
  if (p.g1 === undefined || p.g1 === null || p.g2 === undefined || p.g2 === null) return null;
  return { g1: Number(p.g1), g2: Number(p.g2) };
}

function hasPrediction(p) {
  return normalizePrediction(p) !== null;
}

function normalizePredictions(raw, count) {
  const n = count || getPlayerCount();
  const arr = Array.from({ length: n }, () => null);
  if (!raw) return arr;
  if (Array.isArray(raw)) {
    for (let i = 0; i < n; i++) arr[i] = normalizePrediction(raw[i]);
  } else if (typeof raw === 'object') {
    for (let i = 0; i < n; i++) arr[i] = normalizePrediction(raw[i]);
  }
  return arr;
}

function predictionsToSave(arr) {
  const obj = {};
  (arr || []).forEach((p, i) => {
    const norm = normalizePrediction(p);
    if (norm) obj[i] = norm;
  });
  return obj;
}

function normalizeMatch(m) {
  const def = DEFAULT_MATCHES.find(d => d.id === m.id);
  return {
    ...m,
    team1: (m.team1 && m.team1 !== '') ? m.team1 : (def ? def.team1 : (m.team1 || '')),
    team2: (m.team2 && m.team2 !== '') ? m.team2 : (def ? def.team2 : (m.team2 || '')),
    dateIR: (m.dateIR && m.dateIR !== '') ? m.dateIR : (def ? def.dateIR : ''),
    timeIR: (m.timeIR && m.timeIR !== '') ? m.timeIR : (def ? def.timeIR : ''),
    group: (m.group && m.group !== '') ? m.group : (def ? def.group : ''),
    flag1: (m.flag1 && m.flag1 !== '') ? m.flag1 : (def ? def.flag1 : '🏳️'),
    flag2: (m.flag2 && m.flag2 !== '') ? m.flag2 : (def ? def.flag2 : '🏳️'),
    predictions: normalizePredictions(m.predictions, getPlayerCount()),
    result: m.result || null
  };
}

function normalizeAllMatches() {
  if (!state.matches) return;
  if (!Array.isArray(state.matches)) state.matches = Object.values(state.matches);
  state.matches = state.matches.map(normalizeMatch);
}

// ===== FIREBASE SYNC =====

function ensureAppDataReady() {
  if (!Array.isArray(state.players) || !state.players.length) {
    state.players = ['پوریا', 'بهنام', 'مهدی'];
  }
  if (!state.passwords) state.passwords = ['1234', '1234', '1234'];
  if (!Array.isArray(state.matches) || !state.matches.length) {
    state.matches = JSON.parse(JSON.stringify(DEFAULT_MATCHES));
  }
  normalizeAllMatches();
  ensureTourneyState();
}

function safeSave() {
  try {
    save();
    return true;
  } catch (e) {
    console.error('save failed:', e);
    return false;
  }
}

function mergePredictionsForSave(remoteRaw, localRaw) {
  const count = getPlayerCount();
  const remote = normalizePredictions(remoteRaw, count);
  const local = normalizePredictions(localRaw, count);
  return Array.from({ length: count }, (_, i) => local[i] || remote[i] || null);
}

function mergeMatchesForSave(remoteMatches, localMatches) {
  const remoteList = Array.isArray(remoteMatches) ? remoteMatches : Object.values(remoteMatches || {});
  const remoteById = {};
  remoteList.forEach(m => { if (m && m.id != null) remoteById[m.id] = m; });
  return localMatches.map(lm => {
    const rm = remoteById[lm.id];
    if (!rm) return lm;
    return {
      ...lm,
      result: lm.result || rm.result || null,
      predictions: predictionsToSave(mergePredictionsForSave(rm.predictions, lm.predictions))
    };
  });
}

function save() {
  ensureAppDataReady();
  cacheTourneyPreds(state.tourneyPreds);
  cacheMatchPreds(state.matches);
  const toSave = {
    players: state.players,
    passwords: state.passwords,
    nextId: state.nextId,
    matches: state.matches.map(m => ({
      id: m.id,
      team1: m.team1,
      team2: m.team2,
      flag1: m.flag1,
      flag2: m.flag2,
      group: m.group,
      dateIR: m.dateIR,
      timeIR: m.timeIR,
      result: m.result || null,
      predictions: predictionsToSave(m.predictions)
    })),
    tourneyPreds: state.tourneyPreds,
    tourneyResult: state.tourneyResult,
    playerAwardDeadlineAt: state.playerAwardDeadlineAt || null
  };
  cachePlayerAwardDeadline(state.playerAwardDeadlineAt);
  db.ref('gameState').transaction(current => {
    if (!current) return toSave;
    return {
      ...current,
      ...toSave,
      matches: mergeMatchesForSave(current.matches, toSave.matches),
      tourneyPreds: mergeTourneyPredsList(toSave.tourneyPreds, current.tourneyPreds),
      tourneyResult: { ...TOURNEY_PRED_DEFAULT, ...(current.tourneyResult || {}), ...(toSave.tourneyResult || {}) },
      playerAwardDeadlineAt: toSave.playerAwardDeadlineAt || current.playerAwardDeadlineAt || null
    };
  }, (error) => {
    if (error) {
      console.error('Firebase save failed:', error);
      showToast('خطا در ذخیره روی سرور — دوباره امتحان کنید');
    }
  });
  persistFullBackup();
}

// ===== FULL BACKUP (localStorage) =====
function buildFullBackupPayload() {
  return {
    schema: FULL_BACKUP_SCHEMA,
    appVersion: APP_VERSION,
    savedAt: Date.now(),
    matchPredictions: matchPredsMapFromMatches(state.matches),
    tourneyPreds: (state.tourneyPreds || []).map(normalizeTourneyPred),
    tourneyResult: { ...TOURNEY_PRED_DEFAULT, ...(state.tourneyResult || {}) },
    playerAwardDeadlineAt: state.playerAwardDeadlineAt || null
  };
}

function readFullBackupLocal() {
  try {
    const raw = localStorage.getItem(FULL_BACKUP_CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function cacheFullBackupLocal(payload) {
  try { localStorage.setItem(FULL_BACKUP_CACHE_KEY, JSON.stringify(payload)); } catch {}
}

function formatBackupTime(ts) {
  if (!ts) return '—';
  try {
    return new Date(Number(ts)).toLocaleString('fa-IR', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' });
  } catch { return '—'; }
}

function updateBackupStatusUI() {
  const el = document.getElementById('backup-status-label');
  if (!el) return;
  const local = readFullBackupLocal();
  el.innerHTML = `آخرین بک‌آپ مرورگر: ${formatBackupTime(local?.savedAt)}<br>پیش‌بینی‌ها روی Firebase مشترک ذخیره می‌شوند — همه از همین لینک استفاده کنید:<br><bdi dir="ltr" class="ltr-inline">${APP_URL}</bdi>`;
}

function persistFullBackup() {
  cacheFullBackupLocal(buildFullBackupPayload());
  updateBackupStatusUI();
}

function readCachedPlayerAwardDeadline() {
  try {
    const n = Number(localStorage.getItem(PLAYER_AWARD_DEADLINE_CACHE_KEY));
    return n > 0 ? n : null;
  } catch { return null; }
}

function cachePlayerAwardDeadline(ts) {
  if (!ts) return;
  try { localStorage.setItem(PLAYER_AWARD_DEADLINE_CACHE_KEY, String(ts)); } catch {}
}

function readCachedTourneyPreds() {
  try {
    const raw = localStorage.getItem(TOURNEY_PREDS_CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function cacheTourneyPreds(preds) {
  if (!preds) return;
  try { localStorage.setItem(TOURNEY_PREDS_CACHE_KEY, JSON.stringify(preds)); } catch {}
}

function tourneyPredHasAnyValue(pred) {
  const n = normalizeTourneyPred(pred);
  return Object.keys(TOURNEY_FIELD_META).some(k => n[k] && String(n[k]).trim());
}

function mergeTourneyPredPair(a, b) {
  const left = normalizeTourneyPred(a);
  const right = normalizeTourneyPred(b);
  const out = { ...TOURNEY_PRED_DEFAULT };
  Object.keys(TOURNEY_FIELD_META).forEach(key => {
    const lv = (left[key] || '').trim();
    const rv = (right[key] || '').trim();
    out[key] = lv || rv || '';
  });
  return out;
}

function mergeTourneyPredsList(...sources) {
  const count = getPlayerCount();
  const merged = Array.from({ length: count }, () => ({ ...TOURNEY_PRED_DEFAULT }));
  sources.forEach(src => {
    if (!src) return;
    const list = Array.isArray(src) ? src : Object.values(src);
    for (let i = 0; i < count; i++) {
      merged[i] = mergeTourneyPredPair(merged[i], list[i]);
    }
  });
  return merged;
}

function syncTourneyPredsFromSources(fbPreds, memoryPreds, cachedPreds, localFullPreds) {
  state.tourneyPreds = mergeTourneyPredsList(fbPreds, memoryPreds, cachedPreds, localFullPreds, TOURNEY_KNOWN_BACKUP);
  if (state.tourneyPreds.some(tourneyPredHasAnyValue)) cacheTourneyPreds(state.tourneyPreds);
}

function matchPredHasAnyValue(raw) {
  return normalizePredictions(raw).some(hasPrediction);
}

function mergePredictionPair(a, b) {
  const left = normalizePrediction(a);
  const right = normalizePrediction(b);
  return left || right || null;
}

function mergePredictionsList(...sources) {
  const count = getPlayerCount();
  const merged = Array.from({ length: count }, () => null);
  sources.forEach(src => {
    normalizePredictions(src, count).forEach((p, i) => {
      merged[i] = mergePredictionPair(merged[i], p);
    });
  });
  return merged;
}

function matchPredsMapFromMatches(matches) {
  const map = {};
  (matches || []).forEach(m => {
    if (!m || !m.id || !matchPredHasAnyValue(m.predictions)) return;
    map[m.id] = normalizePredictions(m.predictions);
  });
  return map;
}

function readCachedMatchPreds() {
  try {
    const raw = localStorage.getItem(MATCH_PREDS_CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function cacheMatchPreds(matches) {
  const map = matchPredsMapFromMatches(matches);
  if (!Object.keys(map).length) return;
  try { localStorage.setItem(MATCH_PREDS_CACHE_KEY, JSON.stringify(map)); } catch {}
}

function syncMatchPredsFromSources(fbMatches, memoryMatches, cachedMap, localFullMap) {
  if (!Array.isArray(state.matches)) return;
  const fbMap = matchPredsMapFromMatches(fbMatches);
  const memoryMap = matchPredsMapFromMatches(memoryMatches);
  state.matches = state.matches.map(m => {
    const merged = mergePredictionsList(
      m.predictions,
      fbMap[m.id],
      memoryMap[m.id],
      (cachedMap || {})[m.id],
      (localFullMap || {})[m.id],
      MATCH_PREDICTIONS_KNOWN_BACKUP[m.id]
    );
    if (!matchPredHasAnyValue(merged)) return m;
    return { ...m, predictions: merged };
  });
  cacheMatchPreds(state.matches);
}

function countMatchPredsInRaw(raw) {
  if (!raw) return 0;
  const list = Array.isArray(raw) ? raw : Object.values(raw);
  return list.filter(m => m && matchPredHasAnyValue(m.predictions)).length;
}

function maybeRestoreRicherDataToFirebase(data) {
  if (matchPredRestoreScheduled) return;
  const fbMatchCount = countMatchPredsInRaw(data?.matches);
  const stateMatchCount = state.matches.filter(m => matchPredHasAnyValue(m.predictions)).length;
  const fbTourneyEmpty = firebaseTourneyIsEmpty(data?.tourneyPreds);
  const stateTourneyHas = state.tourneyPreds.some(tourneyPredHasAnyValue);
  if (stateMatchCount <= fbMatchCount && !(fbTourneyEmpty && stateTourneyHas)) return;
  matchPredRestoreScheduled = true;
  setTimeout(() => safeSave(), 800);
}

function hasIndividualAwardPreds() {
  return (state.tourneyPreds || []).some(p => {
    const n = normalizeTourneyPred(p);
    return (n.topScorer && n.topScorer.trim()) ||
      (n.bestPlayer && n.bestPlayer.trim()) ||
      (n.bestGoalkeeper && n.bestGoalkeeper.trim());
  });
}

function restorePlayerAwardDeadline(fromData) {
  let deadline = null;
  if (fromData && fromData.playerAwardDeadlineAt) deadline = Number(fromData.playerAwardDeadlineAt);
  const localFull = readFullBackupLocal();
  if (localFull?.playerAwardDeadlineAt) deadline = Math.max(deadline || 0, Number(localFull.playerAwardDeadlineAt));
  const cached = readCachedPlayerAwardDeadline();
  if (cached) deadline = Math.max(deadline || 0, cached);
  if (deadline) {
    state.playerAwardDeadlineAt = deadline;
    cachePlayerAwardDeadline(deadline);
  }
}

function ensurePlayerAwardDeadlineOnFirstSave(field) {
  const meta = TOURNEY_FIELD_META[field];
  if (!meta || meta.deadlineType !== 'player24h') return;
  if (state.playerAwardDeadlineAt) return;
  state.playerAwardDeadlineAt = Date.now() + PLAYER_AWARD_HOURS * 3600000;
  cachePlayerAwardDeadline(state.playerAwardDeadlineAt);
}

function repairPlayerAwardDeadlineIfNeeded() {
  if (!state.playerAwardDeadlineAt || !hasIndividualAwardPreds()) return false;
  const remaining = Number(state.playerAwardDeadlineAt) - Date.now();
  if (remaining > 20 * 3600000) {
    state.playerAwardDeadlineAt = Date.now() + PLAYER_AWARD_REPAIR_REMAINING_HOURS * 3600000;
    cachePlayerAwardDeadline(state.playerAwardDeadlineAt);
    return true;
  }
  return false;
}

function firebaseTourneyIsEmpty(fbPreds) {
  if (!fbPreds) return true;
  const list = Array.isArray(fbPreds) ? fbPreds : Object.values(fbPreds);
  return !list.some(tourneyPredHasAnyValue);
}

function maybeRestoreTourneyToFirebase(data) {
  if (!data || tourneyRestoreScheduled) return;
  if (!firebaseTourneyIsEmpty(data.tourneyPreds)) return;
  if (!state.tourneyPreds.some(tourneyPredHasAnyValue)) return;
  tourneyRestoreScheduled = true;
  setTimeout(() => safeSave(), 800);
}

function applyFirebaseData(data, ap) {
  const preservedMatches = state.matches;
  const cachedMatchPreds = readCachedMatchPreds();
  const localFullBackup = readFullBackupLocal();
  const localMatchMap = localFullBackup?.matchPredictions || null;
  if (!data) {
    state.matches = JSON.parse(JSON.stringify(DEFAULT_MATCHES));
    state.players = ['پوریا', 'بهنام', 'مهدی'];
    state.passwords = ['1234', '1234', '1234'];
    state.nextId = 73;
    syncTourneyPredsFromSources(null, state.tourneyPreds, readCachedTourneyPreds(), localFullBackup?.tourneyPreds);
    ensureAppDataReady();
    syncMatchPredsFromSources(null, preservedMatches, cachedMatchPreds, localMatchMap);
    persistFullBackup();
    return;
  }

  const preservedDeadline = state.playerAwardDeadlineAt;
  const preservedTourneyPreds = state.tourneyPreds;
  const cachedTourneyPreds = readCachedTourneyPreds();
  state = { ...state, ...data, activePlayer: ap };
  if (!state.passwords) state.passwords = ['1234', '1234', '1234'];
  syncTourneyPredsFromSources(data.tourneyPreds, preservedTourneyPreds, cachedTourneyPreds, localFullBackup?.tourneyPreds);
  restorePlayerAwardDeadline(data);
  if (!state.playerAwardDeadlineAt && preservedDeadline) state.playerAwardDeadlineAt = preservedDeadline;
  ensureAppDataReady();
  syncMatchPredsFromSources(data.matches, preservedMatches, cachedMatchPreds, localMatchMap);
  repairPlayerAwardDeadlineIfNeeded();
  maybeRestoreTourneyToFirebase(data);
  maybeRestoreRicherDataToFirebase(data);
  updateBackupStatusUI();
}

// ===== POINTS =====
function calcPoints(pred, result) {
  if (!pred || !result) return 0;
  if (pred.g1 === result.g1 && pred.g2 === result.g2) return 3;
  const pw = pred.g1 > pred.g2 ? 1 : pred.g1 < pred.g2 ? -1 : 0;
  const rw = result.g1 > result.g2 ? 1 : result.g1 < result.g2 ? -1 : 0;
  if (pw === rw) return 1;
  return 0;
}

function playerScore(pIdx) {
  let total = 0, exact = 0, correct = 0;
  state.matches.forEach(m => {
    if (m.result) {
      const pts = calcPoints(m.predictions[pIdx], m.result);
      total += pts;
      if (pts === 3) exact++;
      else if (pts === 1) correct++;
    }
  });
  return { total, exact, correct };
}

// ===== COUNTDOWN =====
// Match dates: map from Persian month to Gregorian 2026
const IR_MONTHS = {
  'خرداد': 5, 'تیر': 6, 'مرداد': 7
};
const PERSIAN_NUMS = {'۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};

function toEnNum(s) {
  return String(s).replace(/[۰-۹]/g, d => PERSIAN_NUMS[d] || d);
}

function toFaNum(n) {
  return String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
}

function persianDateToGregorian(dateIR) {
  const parts = dateIR.trim().split(/\s+/);
  if (parts.length < 2) return null;
  const day = parseInt(toEnNum(parts[0]), 10);
  const monthName = parts[1];
  const gMonth = IR_MONTHS[monthName];
  if (!gMonth || isNaN(day)) return null;
  // خرداد ۱۴۰۵ از ۲۲ می ۲۰۲۶، تیر ۱۴۰۵ از ۲۲ ژوئن ۲۰۲۶
  const baseDay = {5: 22, 6: 22}[gMonth];
  const baseMonth = {5: 5, 6: 6}[gMonth];
  const dt = new Date(Date.UTC(2026, baseMonth - 1, baseDay + day - 1));
  return { year: dt.getUTCFullYear(), month: dt.getUTCMonth() + 1, day: dt.getUTCDate() };
}

const IRAN_TZ = 'Asia/Tehran';
const IRAN_UTC_OFFSET_MS = 3.5 * 60 * 60 * 1000;

function getMatchDate(m) {
  // dateIR مثل «۲۱ خرداد»، timeIR مثل «۱۸:۳۰» — هر دو به وقت ایران
  try {
    if (m.utcDate) return new Date(m.utcDate);
    if (!m.dateIR || !m.timeIR) return null;
    const g = persianDateToGregorian(m.dateIR);
    if (!g) return null;
    const timeParts = toEnNum(m.timeIR).split(':');
    const hIR = parseInt(timeParts[0], 10);
    const minIR = parseInt(timeParts[1], 10);
    if (isNaN(hIR) || isNaN(minIR)) return null;
    const utcMs = Date.UTC(g.year, g.month - 1, g.day, hIR, minIR) - IRAN_UTC_OFFSET_MS;
    return new Date(utcMs);
  } catch(e) { return null; }
}

function formatIranTime(date) {
  const parts = new Intl.DateTimeFormat('en-GB', {
    timeZone: IRAN_TZ,
    hour: '2-digit',
    minute: '2-digit',
    hour12: false
  }).formatToParts(date);
  const h = parts.find(p => p.type === 'hour').value;
  const min = parts.find(p => p.type === 'minute').value;
  return toFaNum(`${h}:${min}`);
}

function formatMatchScheduleHTML(m) {
  if (!m.dateIR && !m.timeIR) return '';
  const d = getMatchDate(m);
  const time = d ? formatIranTime(d) : (m.timeIR || '');
  const date = m.dateIR || '';
  if (!time) return date;
  return `${date} • ${time} <span class="tz-label">(به وقت ایران)</span>`;
}

function formatCountdown(ms) {
  if (ms <= 0) return null;
  const s = Math.floor(ms / 1000);
  const days = Math.floor(s / 86400);
  const hrs  = Math.floor((s % 86400) / 3600);
  const mins = Math.floor((s % 3600) / 60);
  const secs = s % 60;
  return {days, hrs, mins, secs};
}

function buildCountdownHTML(m) {
  const d = getMatchDate(m);
  if (!d) return '';
  const now = Date.now();
  const diff = d.getTime() - now;
  if (diff < -7200000) return ''; // started >2h ago, hide
  if (diff < 0) return `<div class="cd-started">🔴 بازی در جریان است</div>`;
  const cd = formatCountdown(diff);
  if (!cd) return '';
  if (diff < 3600000) { // less than 1 hour
    return `<div class="cd-soon">⚡ ${cd.mins} دقیقه و ${String(cd.secs).padStart(2,'0')} ثانیه تا شروع</div>`;
  }
  return `<div class="countdown-wrap">
    <div class="cd-unit"><div class="cd-num" data-cd-days="${m.id}">${cd.days}</div><div class="cd-label">روز</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-num" data-cd-hrs="${m.id}">${String(cd.hrs).padStart(2,'0')}</div><div class="cd-label">ساعت</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-num" data-cd-mins="${m.id}">${String(cd.mins).padStart(2,'0')}</div><div class="cd-label">دقیقه</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-num" data-cd-secs="${m.id}">${String(cd.secs).padStart(2,'0')}</div><div class="cd-label">ثانیه</div></div>
  </div>`;
}

function normalizeTourneyPred(pred) {
  return { ...TOURNEY_PRED_DEFAULT, ...(pred || {}) };
}

function ensureTourneyState() {
  if (!Array.isArray(state.players) || !state.players.length) return;
  if (!Array.isArray(state.tourneyPreds)) {
    const old = state.tourneyPreds;
    if (old && typeof old === 'object') {
      state.tourneyPreds = state.players.map((_, i) => normalizeTourneyPred(old[i]));
    } else {
      state.tourneyPreds = state.players.map(() => ({ ...TOURNEY_PRED_DEFAULT }));
    }
  } else {
    state.tourneyPreds = state.players.map((_, i) => normalizeTourneyPred(state.tourneyPreds[i]));
  }
  state.tourneyResult = { ...TOURNEY_PRED_DEFAULT, ...(state.tourneyResult || {}) };
}

function isKnockoutStage(group) {
  const g = (group || '').trim();
  if (!g || g.startsWith('گروه')) return false;
  return KNOCKOUT_STAGE_RE.test(g) || !/^گروه\s/.test(g);
}

function getFirstKnockoutMatch() {
  let first = null;
  let firstTime = null;
  state.matches.forEach(m => {
    if (!isKnockoutStage(m.group)) return;
    const d = getMatchDate(m);
    if (!d) return;
    const t = d.getTime();
    if (firstTime === null || t < firstTime) {
      firstTime = t;
      first = m;
    }
  });
  return first || { ...FIRST_KNOCKOUT_FALLBACK };
}

function getKnockoutDeadline() {
  const m = getFirstKnockoutMatch();
  return m ? getMatchDate(m) : null;
}

function getPlayerAwardDeadline() {
  if (!state.playerAwardDeadlineAt) return null;
  return new Date(Number(state.playerAwardDeadlineAt));
}

function getTourneyDeadlineByType(type) {
  return type === 'knockout' ? getKnockoutDeadline() : getPlayerAwardDeadline();
}

function isTourneyFieldLocked(field) {
  const meta = TOURNEY_FIELD_META[field];
  if (!meta) return true;
  const d = getTourneyDeadlineByType(meta.deadlineType);
  return d ? Date.now() >= d.getTime() : false;
}

function buildTourneyDeadlineCard(deadline, title, subWhenOpen, match, cdPrefix) {
  if (!deadline) {
    return `<div class="tourney-deadline-card">
      <div class="tourney-deadline-title">${title}</div>
      <div class="tourney-deadline-sub">${subWhenOpen}</div>
    </div>`;
  }
  const diff = deadline.getTime() - Date.now();
  const matchLabel = match && match.team1
    ? `${match.flag1 || ''} ${match.team1}${match.team2 ? ' — ' + match.team2 + ' ' + (match.flag2 || '') : ''}`.trim()
    : '';
  const schedule = match && match.dateIR ? formatMatchScheduleHTML(match) : '';
  if (diff <= 0) {
    return `<div class="tourney-deadline-card tourney-deadline-closed">
      <div class="tourney-deadline-title">🔒 ${title.replace(/^⏰\s*/, '')} — تمام شد</div>
      ${matchLabel ? `<div class="tourney-deadline-sub">${matchLabel}</div>` : ''}
      ${schedule ? `<div class="tourney-deadline-schedule">${schedule}</div>` : ''}
    </div>`;
  }
  const cd = formatCountdown(diff);
  if (!cd) return '';
  const urgent = diff < 3600000;
  return `<div class="tourney-deadline-card${urgent ? ' tourney-deadline-urgent' : ''}">
    <div class="tourney-deadline-title">${title}</div>
    <div class="tourney-deadline-sub">${subWhenOpen}${matchLabel ? ' — ' + matchLabel : ''}</div>
    <div class="countdown-wrap tourney-countdown">
      <div class="cd-unit"><div class="cd-num" data-cd-${cdPrefix}-days>${cd.days}</div><div class="cd-label">روز</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" data-cd-${cdPrefix}-hrs>${String(cd.hrs).padStart(2, '0')}</div><div class="cd-label">ساعت</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" data-cd-${cdPrefix}-mins>${String(cd.mins).padStart(2, '0')}</div><div class="cd-label">دقیقه</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" data-cd-${cdPrefix}-secs>${String(cd.secs).padStart(2, '0')}</div><div class="cd-label">ثانیه</div></div>
    </div>
    ${schedule ? `<div class="tourney-deadline-schedule">${schedule}</div>` : ''}
  </div>`;
}

function buildTourneyDeadlineHTML() {
  const knockoutMatch = getFirstKnockoutMatch();
  return buildTourneyDeadlineCard(
    getKnockoutDeadline(),
    '⏰ مهلت پیش‌بینی قهرمان و نایب‌قهرمان',
    'تا شروع اولین بازی مرحله حذفی',
    knockoutMatch,
    'knockout'
  ) + buildTourneyDeadlineCard(
    getPlayerAwardDeadline(),
    '⏰ مهلت پیش‌بینی آقای گل و جوایز فردی',
    '۲۴ ساعت مهلت پیش‌بینی',
    null,
    'player'
  );
}

function updateTourneyCountdownPair(deadline, prefix) {
  if (!deadline) return false;
  const diff = deadline.getTime() - Date.now();
  if (diff <= 0) return true;
  const cd = formatCountdown(diff);
  if (!cd) return false;
  const dEl = document.querySelector(`[data-cd-${prefix}-days]`);
  const hEl = document.querySelector(`[data-cd-${prefix}-hrs]`);
  const mEl = document.querySelector(`[data-cd-${prefix}-mins]`);
  const sEl = document.querySelector(`[data-cd-${prefix}-secs]`);
  if (!dEl) return false;
  dEl.textContent = cd.days;
  if (hEl) hEl.textContent = String(cd.hrs).padStart(2, '0');
  if (mEl) mEl.textContent = String(cd.mins).padStart(2, '0');
  if (sEl) sEl.textContent = String(cd.secs).padStart(2, '0');
  const card = dEl.closest('.tourney-deadline-card');
  if (card) card.classList.toggle('tourney-deadline-urgent', diff < 3600000);
  return false;
}

function updateTourneyCountdown() {
  const knockoutExpired = updateTourneyCountdownPair(getKnockoutDeadline(), 'knockout');
  const playerExpired = updateTourneyCountdownPair(getPlayerAwardDeadline(), 'player');
  if (knockoutExpired || playerExpired) {
    if (document.querySelector('[data-cd-knockout-days]') || document.querySelector('[data-cd-player-days]')) {
      renderTourney();
    }
  }
}

// Live countdown ticker
setInterval(() => {
  updateTourneyCountdown();
  state.matches.forEach(m => {
    if (m.result) return;
    const d = getMatchDate(m);
    if (!d) return;
    const diff = d.getTime() - Date.now();
    if (diff < 0 || diff > 7 * 86400000) return; // only update if within 7 days
    const cd = formatCountdown(diff);
    if (!cd) return;
    const dEl = document.querySelector(`[data-cd-days="${m.id}"]`);
    const hEl = document.querySelector(`[data-cd-hrs="${m.id}"]`);
    const mEl = document.querySelector(`[data-cd-mins="${m.id}"]`);
    const sEl = document.querySelector(`[data-cd-secs="${m.id}"]`);
    if (dEl) dEl.textContent = cd.days;
    if (hEl) hEl.textContent = String(cd.hrs).padStart(2,'0');
    if (mEl) mEl.textContent = String(cd.mins).padStart(2,'0');
    if (sEl) sEl.textContent = String(cd.secs).padStart(2,'0');
  });
}, 1000);

function renderLeaderboard() {
  const scores = state.players.map((name, i) => ({ name, i, ...playerScore(i) }));
  scores.forEach(s => { s.total += tourneyScore(s.i); s.tourney = tourneyScore(s.i); });
  scores.sort((a,b) => b.total - a.total || b.exact - a.exact);
  const ranks = ['🥇','🥈','🥉'];
  let html = '';
  scores.forEach((s, rank) => {
    html += `<div class="leaderboard-item lb-${rank+1}" style="animation-delay:${rank*0.1}s">
      <div class="rank">${ranks[rank]||'🏅'}</div>
      <div class="lb-info">
        <div class="lb-name">${s.name}</div>
        <div class="lb-stats">نتیجه دقیق: ${s.exact} • برنده درست: ${s.correct} • قهرمانی: ${s.tourney||0}</div>
      </div>
      <div class="lb-score">${s.total}</div>
    </div>`;
  });

  document.getElementById('leaderboard-content').innerHTML = html;
}

  }

  pending.forEach((m, idx) => {

        <div class="score-divider">:</div>

function renderHistory() {
  const done = state.matches.filter(m => m.result);
  if (!done.length) {
    document.getElementById('history-content').innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>هنوز هیچ بازی‌ای به پایان نرسیده</p></div>`;
    return;
  }
  let html = '';
  [...done].reverse().forEach((m, idx) => {
    const predsHtml = state.players.map((name, i) => {
      const pred = m.predictions[i];
      const pts = calcPoints(pred, m.result);
      const cls = pts > 0 ? 'correct' : 'wrong';
      return `<div class="pred-item ${cls}">
        <div>${name}</div>
        <div class="pred-score">${pred ? `${pred.g1}:${pred.g2}` : '—'}</div>
        <div class="pred-pts">${pts > 0 ? '+'+pts+' امتیاز' : 'صفر'}</div>
      </div>`;
    }).join('');
    html += `<div class="history-item" style="animation-delay:${idx*0.04}s">
      <div class="history-match">${m.flag1} ${m.team1} vs ${m.team2} ${m.flag2} <span style="color:rgba(255,255,255,0.4);font-size:0.8rem">• ${m.group||''}${m.dateIR ? ' • ' + formatMatchScheduleHTML(m) : ''}</span></div>
      <div class="history-result">نتیجه: ${m.result.g1} - ${m.result.g2}</div>
      <div class="predictions-grid">${predsHtml}</div>
    </div>`;
  });
  document.getElementById('history-content').innerHTML = html;
}

  renderOthers();
}

function buildOthersMatchCard(m, idx) {
  const predsHtml = state.players.map((name, i) => {
    const pred = normalizePrediction(m.predictions && m.predictions[i]);
    const avatars = ['🔴','🔵','🟢'];
    if (!pred) {
      return `<div class="others-player-row pending">
        <span class="others-player-name">${avatars[i]} ${name}</span>
        <span class="others-player-pred">—</span>
        <span class="others-player-pts">بدون پیش‌بینی</span>
      </div>`;
    }
    if (m.result) {
      const pts = calcPoints(pred, m.result);
      const cls = pts === 3 ? 'exact' : pts === 1 ? 'correct' : 'wrong';
      const ptsLabel = pts === 3 ? '🎯 +3' : pts === 1 ? '✓ +1' : '✗ ۰';
      return `<div class="others-player-row ${cls}">
        <span class="others-player-name">${avatars[i]} ${name}</span>
        <span class="others-player-pred">${pred.g1} - ${pred.g2}</span>
        <span class="others-player-pts">${ptsLabel}</span>
      </div>`;
    }
    return `<div class="others-player-row pending">
      <span class="others-player-name">${avatars[i]} ${name}</span>
      <span class="others-player-pred">${pred.g1} - ${pred.g2}</span>
      <span class="others-player-pts">در انتظار</span>
    </div>`;
  }).join('');

  return `<div class="others-match-card" style="animation-delay:${idx * 0.02}s">
    <div class="others-match-header">
      <div class="others-match-teams">${m.flag1} ${m.team1} <span class="vs-sm">vs</span> ${m.team2} ${m.flag2}</div>
      <div class="others-match-meta">
        <span class="others-group">${m.group || ''}</span>
        ${m.dateIR || m.timeIR ? `<span class="others-group">${formatMatchScheduleHTML(m)}</span>` : ''}
        ${m.result ? `<span class="others-result-badge">نتیجه: ${m.result.g1} - ${m.result.g2}</span>` : `<span class="others-pending-badge">در انتظار</span>`}
      </div>
    </div>
    <div class="others-players-list">${predsHtml}</div>
  </div>`;
}

function renderOthers() {
  if (!Array.isArray(state.matches)) return;
  const upcoming = state.matches.filter(m => !m.result);
  const past = state.matches.filter(m => m.result).slice().reverse();
  const showPast = othersSubView === 'past';
  const list = showPast ? past : upcoming;

  let html = `<div class="others-subtabs">
    <button type="button" class="others-subtab${showPast ? '' : ' active'}" onclick="switchOthersSubView('upcoming')">⚽ بازی‌های پیش‌رو</button>
    <button type="button" class="others-subtab${showPast ? ' active' : ''}" onclick="switchOthersSubView('past')">📋 بازی‌های گذشته (${past.length})</button>
  </div>`;

  if (!list.length) {
    html += showPast
      ? `<div class="empty"><div class="empty-icon">📭</div><p>هنوز بازی تمام‌شده‌ای نیست</p></div>`
      : `<div class="empty"><div class="empty-icon">✅</div><p>همه بازی‌ها تمام شده — بازی‌های گذشته را ببینید</p></div>`;
  } else {
    html += list.map((m, idx) => buildOthersMatchCard(m, idx)).join('');
  }
  document.getElementById('others-content').innerHTML = html;
}

function tourneyScore(pIdx) {
  const pred = normalizeTourneyPred(state.tourneyPreds && state.tourneyPreds[pIdx]);
  const res = { ...TOURNEY_PRED_DEFAULT, ...(state.tourneyResult || {}) };
  let pts = 0;
  Object.entries(TOURNEY_FIELD_META).forEach(([key, meta]) => {
    if (pred[key] && res[key] && pred[key].trim().toLowerCase() === res[key].trim().toLowerCase()) {
      pts += meta.pts;
    }
  });
  return pts;
}

function saveTourneyPred(field, value) {
  if (isTourneyFieldLocked(field)) {
    showToast('مهلت این پیش‌بینی تمام شده ✗');
    renderTourney();
    return;
  }
  ensureTourneyState();
  state.tourneyPreds[state.activePlayer][field] = value;
  ensurePlayerAwardDeadlineOnFirstSave(field);
  safeSave();
  showToast('پیش‌بینی ذخیره شد ✓');
}

function saveTourneyResult() {
  ensureTourneyState();
  Object.keys(TOURNEY_FIELD_META).forEach(key => {
    const el = document.getElementById(`tr-${key}`);
    if (el) state.tourneyResult[key] = el.value.trim();
  });
  safeSave();
  showToast('نتایج قهرمانی ثبت شد ✓');
}

function renderTourney() {
  const el = document.getElementById('tourney-content');
  if (!el) return;
  if (state.activePlayer < 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🏆</div><p>ابتدا وارد شوید</p></div>';
    return;
  }
  ensureTourneyState();
  const p = state.activePlayer;
  const pred = normalizeTourneyPred(state.tourneyPreds[p]);
  const res = { ...TOURNEY_PRED_DEFAULT, ...(state.tourneyResult || {}) };
  const hasAnyResult = Object.keys(TOURNEY_FIELD_META).some(k => res[k] && res[k].trim());
  const anyFieldOpen = Object.keys(TOURNEY_FIELD_META).some(k => !isTourneyFieldLocked(k) && !(res[k] && res[k].trim()));

  let myHtml = `
    <div style="margin-bottom:20px">
      <div class="tourney-section-title">🏆 پیش‌بینی قهرمانی</div>
      <div class="tourney-section-sub">${anyFieldOpen ? 'هر بخش مهلت جداگانه دارد — قبل از پایان مهلت ثبت کن' : 'مهلت پیش‌بینی به پایان رسید — فقط مشاهده'}</div>
    </div>
    ${buildTourneyDeadlineHTML()}`;

  Object.entries(TOURNEY_FIELD_META).forEach(([key, meta]) => {
    const locked = (res[key] && res[key].trim()) || isTourneyFieldLocked(key);
    myHtml += `
    <div class="tourney-card">
      <div class="tourney-title">${meta.icon} ${meta.label} <span class="tourney-pts-badge">+${meta.pts} امتیاز</span></div>
      <input class="tourney-input" id="tp-${key}" placeholder="${meta.placeholder}" value="${pred[key] || ''}"
        onchange="saveTourneyPred('${key}',this.value)" ${locked ? 'disabled' : ''}>
    </div>`;
  });

  if (hasAnyResult) {
    myHtml += `<div class="card" style="margin-top:4px">
      <div class="card-title">📊 نتیجه پیش‌بینی‌های تو</div>`;
    Object.entries(TOURNEY_FIELD_META).forEach(([key, meta]) => {
      const my = pred[key];
      const real = res[key];
      const match = my && real && my.trim().toLowerCase() === real.trim().toLowerCase();
      const cls = !real ? 'tourney-result-pending' : match ? 'tourney-result-correct' : 'tourney-result-wrong';
      myHtml += `<div class="tourney-result-row ${cls}">
        <span>${match ? '🎯' : (!real ? '⏳' : '✗')}</span>
        <span style="flex:1">${meta.label}: <strong>${my || '—'}</strong></span>
        <span style="color:rgba(255,255,255,0.4);font-size:0.8rem">واقعی: ${real || 'مشخص نشده'}</span>
        <span style="color:${match ? '#00e676' : 'rgba(255,255,255,0.3)'}; font-weight:700; margin-right:8px">${match ? '+' + meta.pts + ' امتیاز' : ''}</span>
      </div>`;
    });
    myHtml += '</div>';
  }

  myHtml += `<div class="card" style="margin-top:4px">
    <div class="card-title">👥 پیش‌بینی دیگران</div>`;
  Object.entries(TOURNEY_FIELD_META).forEach(([key, meta]) => {
    myHtml += `<div style="margin-bottom:14px"><div style="font-size:0.82rem;color:var(--gold);margin-bottom:8px">${meta.icon} ${meta.label}</div>`;
    state.players.forEach((name, i) => {
      const pr = normalizeTourneyPred(state.tourneyPreds[i])[key];
      const real = res[key];
      const match = pr && real && pr.trim().toLowerCase() === real.trim().toLowerCase();
      myHtml += `<div class="tourney-others-row">
        <span class="tourney-others-name">⚽ ${name}</span>
        <span class="tourney-others-val">${pr || '—'}</span>
        ${real ? `<span style="color:${match ? '#00e676' : 'rgba(255,100,100,0.7)'}; font-size:0.8rem">${match ? '🎯 +' + meta.pts + ' امتیاز' : '✗'}</span>` : ''}
      </div>`;
    });
    myHtml += '</div>';
  });
  myHtml += '</div>';

  el.innerHTML = myHtml;
}

function renderAdminResults() {
  const card = document.getElementById('admin-results-card');
  const list = document.getElementById('admin-results-list');
  if (!card || !list) return;
  // فقط برای پوریا (player 0) نمایش داده بشه
  if (state.activePlayer !== 0) { card.style.display = 'none'; return; }
  card.style.display = '';
  const unfinished = state.matches.filter(m => !m.result);
  const finished = state.matches.filter(m => m.result);
  let html = '';
  if (unfinished.length) {
    html += `<p style="color:rgba(255,255,255,0.5);font-size:0.82rem;margin:0 0 10px">بازی‌های بدون نتیجه (${unfinished.length})</p>`;
    unfinished.forEach(m => {
      html += `<div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:12px 14px;margin-bottom:10px">
        <div style="font-size:0.9rem;margin-bottom:8px">${m.flag1} ${m.team1} vs ${m.team2} ${m.flag2} <span style="color:rgba(255,255,255,0.4);font-size:0.78rem">${m.group||''}</span></div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" min="0" max="20" id="res-${m.id}-g1" placeholder="0" style="width:56px;text-align:center;padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;font-size:1rem">
          <span style="color:rgba(255,255,255,0.4)">-</span>
          <input type="number" min="0" max="20" id="res-${m.id}-g2" placeholder="0" style="width:56px;text-align:center;padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;font-size:1rem">
          <button class="btn" style="padding:6px 14px;font-size:0.82rem;flex:1" onclick="submitResult(${m.id})">✅ ثبت</button>
        </div>
      </div>`;
    });
  }
  if (finished.length) {
    html += `<p style="color:rgba(255,255,255,0.4);font-size:0.78rem;margin:14px 0 8px">ثبت‌شده (${finished.length}) — کلیک برای ویرایش</p>`;
    finished.forEach(m => {
      html += `<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:0.85rem">${m.flag1} ${m.team1} ${m.result.g1} - ${m.result.g2} ${m.team2} ${m.flag2}</span>
        <button onclick="clearResult(${m.id})" style="background:none;border:none;color:rgba(255,80,80,0.7);cursor:pointer;font-size:0.8rem">✕ حذف</button>
      </div>`;
    });
  }
  if (!unfinished.length && !finished.length) {
    html = '<p style="color:rgba(255,255,255,0.4);font-size:0.85rem">هنوز بازی‌ای وجود ندارد</p>';
  }
  list.innerHTML = html;
}

function clearResult(matchId) {
  const m = state.matches.find(x => x.id === matchId);
  if (!m) return;
  if (!confirm(`نتیجه ${m.team1} vs ${m.team2} حذف بشه؟`)) return;
  m.result = null;
  safeSave();
  showToast('نتیجه حذف شد');
  renderAdminResults();
}

function renderSettings() {
  const verEl = document.getElementById('app-version-label');
  if (verEl) verEl.textContent = APP_VERSION + ' — ' + APP_URL;
  updateBackupStatusUI();
  let html = state.players.map((name, i) => `
    <div class="input-group">
      <label class="input-label">بازیکن ${i+1}</label>
      <input class="input-field" id="pname-${i}" value="${name}" placeholder="اسم بازیکن">
    </div>
  `).join('');
  document.getElementById('player-names-inputs').innerHTML = html;
  // Password change player selector
  document.getElementById('pw-change-player-selector').innerHTML = `
    <label class="input-label">بازیکن برای تغییر رمز:</label>
    <select class="input-field" id="pw-change-player">
      ${state.players.map((n,i) => `<option value="${i}">${n}</option>`).join('')}
    </select>
  `;
  renderAdminResults();
}

// ===== ACTIONS =====
function savePred(matchId, field, val) {
  const m = state.matches.find(x => x.id === matchId);
  if (!m) return;
  if (!Array.isArray(m.predictions)) m.predictions = normalizePredictions(m.predictions);
  if (!m.predictions[state.activePlayer]) m.predictions[state.activePlayer] = { g1: 0, g2: 0 };
  m.predictions[state.activePlayer][field] = parseInt(val) || 0;
  pendingSave = true;
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(() => {
    safeSave();
    showToast('پیش‌بینی ذخیره شد ✓');
    pendingSave = false;
  }, 600);
}

function submitResult(matchId) {
  const m = state.matches.find(x => x.id === matchId);
  const g1 = parseInt(document.getElementById(`res-${matchId}-g1`).value);
  const g2 = parseInt(document.getElementById(`res-${matchId}-g2`).value);
  if (isNaN(g1) || isNaN(g2)) { showToast('لطفاً نتیجه را وارد کنید'); return; }
  m.result = { g1, g2 };
  safeSave();
  showToast(`نتیجه ${m.team1} ${g1} - ${g2} ${m.team2} ثبت شد! 🎉`);
  renderAdminResults();
  renderHistory();
}

function toggleAddMatch() {
  const form = document.getElementById('add-match-form');
  form.classList.toggle('open');
  document.getElementById('add-match-btn').textContent = form.classList.contains('open') ? '✕ بستن' : '+ افزودن بازی';
}

function addMatch() {
  const t1 = document.getElementById('team1-name').value.trim();
  const t2 = document.getElementById('team2-name').value.trim();
  const f1 = document.getElementById('team1-flag').value.trim() || '🏳️';
  const f2 = document.getElementById('team2-flag').value.trim() || '🏳️';
  const stage = document.getElementById('match-stage').value;
  if (!t1 || !t2) { showToast('اسم هر دو تیم را وارد کنید'); return; }
  state.matches.push({ id: state.nextId++, team1: t1, team2: t2, flag1: f1, flag2: f2, group: stage, dateIR: '', timeIR: '', result: null, predictions: [null,null,null] });
  safeSave();
  showToast(`بازی ${t1} vs ${t2} اضافه شد! ⚽`);
  ['team1-name','team2-name','team1-flag','team2-flag'].forEach(id => document.getElementById(id).value = '');
  toggleAddMatch();
}

function savePlayers() {
  state.players = state.players.map((_, i) => document.getElementById(`pname-${i}`).value.trim() || `بازیکن ${i+1}`);
  safeSave();
  showToast('اسامی ذخیره شد ✓');
  render();
}

function changePassword() {
  const oldPw = document.getElementById('old-pw').value;
  const newPw = document.getElementById('new-pw').value;
  const newPw2 = document.getElementById('new-pw2').value;
  const pIdx = parseInt(document.getElementById('pw-change-player').value);
  const currentPw = state.passwords[pIdx] || DEFAULT_PASSWORD;
  if (oldPw !== currentPw) { showToast('رمز فعلی اشتباه است ✗'); return; }
  if (!newPw) { showToast('رمز جدید نمی‌تواند خالی باشد'); return; }
  if (newPw !== newPw2) { showToast('رمزهای جدید مطابقت ندارند'); return; }
  state.passwords[pIdx] = newPw;
  save();
  document.getElementById('old-pw').value = '';
  document.getElementById('new-pw').value = '';
  document.getElementById('new-pw2').value = '';
  showToast(`رمز ${state.players[pIdx]} تغییر کرد ✓`);
}

function resetAll() {
  if (!confirm('مطمئنی؟ همه داده‌ها پاک می‌شن!')) return;
  clearSession();
  db.ref('gameState').remove().then(() => location.reload());
}

// ===== ONLINE RESULTS =====
function normalizeTla(tla) {
  return (tla || '').toUpperCase().trim();
}

function tlaMatches(localTla, apiTla) {
  return normalizeTla(localTla) === normalizeTla(apiTla);
}

function findLocalMatchForApi(homeTeam, awayTeam) {
  const hTla = normalizeTla(homeTeam.tla);
  const aTla = normalizeTla(awayTeam.tla);
  for (const m of state.matches) {
    if (m.result) continue;
    const mH = TEAM_TLA[m.team1];
    const mA = TEAM_TLA[m.team2];
    if (!mH || !mA) continue;
    if (tlaMatches(mH, hTla) && tlaMatches(mA, aTla)) return { match: m, swapped: false };
    if (tlaMatches(mH, aTla) && tlaMatches(mA, hTla)) return { match: m, swapped: true };
  }
  return null;
}

function localDateStr(d) {
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${mo}-${day}`;
}

async function fetchOnlineResults() {
  const btn = document.getElementById('refresh-btn');
  if (btn) {
    btn.classList.add('spinning');
    const label = btn.querySelector('span:last-child');
    if (label) label.textContent = 'در حال دریافت...';
  }
  try {
    const todayStr = localDateStr(new Date());
    const from = new Date();
    from.setDate(from.getDate() - 21);
    const fromStr = localDateStr(from);
    const apiPath = `/competitions/${WC2026_ID}/matches?season=2026&dateFrom=${fromStr}&dateTo=${todayStr}&status=FINISHED`;
    const hosted = /\.(web\.app|firebaseapp\.com)$/.test(location.hostname);
    const url = hosted ? `/api/fd${apiPath}` : `https://api.football-data.org/v4${apiPath}`;
    const res = await fetch(url, hosted ? {} : { headers: { 'X-Auth-Token': FD_API_KEY } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const matches = data.matches || [];
    let updated = 0;
    matches.forEach(apiMatch => {
      if (!apiMatch.score || !apiMatch.score.fullTime) return;
      const ft = apiMatch.score.fullTime;
      if (ft.home === null || ft.away === null) return;
      if (!['FINISHED', 'AWARDED'].includes(apiMatch.status)) return;
      const found = findLocalMatchForApi(apiMatch.homeTeam, apiMatch.awayTeam);
      if (!found) return;
      found.match.result = found.swapped
        ? { g1: ft.away, g2: ft.home }
        : { g1: ft.home, g2: ft.away };
      updated++;
    });
    if (updated > 0) {
      safeSave();
      render();
      showToast(`${updated} نتیجه از اینترنت دریافت شد ✓`);
    } else {
      showToast('نتیجه جدیدی یافت نشد');
    }
  } catch(e) {
    showToast('خطا در دریافت نتایج آنلاین');
    console.error(e);
  }
  if (btn) {
    btn.classList.remove('spinning');
    const label = btn.querySelector('span:last-child');
    if (label) label.textContent = 'بروزرسانی نتایج از اینترنت';
  }
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
